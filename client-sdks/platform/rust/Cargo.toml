[package]
name = "alien-platform-api"
version = "0.1.1"
authors = ["OpenAPI Generator team and contributors"]
description = "Auto-generated Rust SDK for the Alien Platform API"
license = "MIT"
edition = "2021"

[features]
default = ["rustls"]
native-tls = ["reqwest/native-tls"]
rustls = ["reqwest/rustls-tls-webpki-roots"]

[dependencies]
alien-error = { workspace = true }
futures = "0.3"
progenitor-client = { git = "https://github.com/oxidecomputer/progenitor" }
reqwest = { version = "0.12", features = ["json", "stream"], default-features = false }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
regress = "0.10"
chrono = { version = "0.4", features = ["serde"] }

[build-dependencies]
prettyplease = "0.2.22"
progenitor = { git = "https://github.com/oxidecomputer/progenitor" }
serde_json = "1.0"
syn = "2.0"
