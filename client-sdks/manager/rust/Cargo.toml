[package]
name = "alien-manager-api"
version.workspace = true
edition = "2021"
description = "Auto-generated Rust SDK for the Alien Manager API"
license-file.workspace = true
include = ["build.rs", "src/**/*", "openapi-3.0.json"]

[features]
default = ["rustls"]
native-tls = ["reqwest/native-tls"]
rustls = ["reqwest/rustls-tls-webpki-roots"]

[dependencies]
alien-error = { workspace = true }
futures = { workspace = true }
progenitor-client = { version = "0.14.0" }
reqwest = { version = "0.13", features = ["json", "stream"], default-features = false }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
regress = "0.11"
chrono = { workspace = true, features = ["serde"] }

[build-dependencies]
prettyplease = "0.3.0"
progenitor = { version = "0.14.0" }
serde_json = { workspace = true }
syn = "2.0"

[dev-dependencies]
http = { workspace = true }
tokio = { workspace = true }
