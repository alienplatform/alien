[package]
name = "alien-manager-api"
version = "0.1.0"
edition = "2021"
description = "Auto-generated Rust SDK for the Alien Manager API"
license = "MIT"

[features]
default = ["rustls"]
native-tls = ["reqwest/native-tls"]
rustls = ["reqwest/rustls-tls-webpki-roots"]

[dependencies]
alien-error = { workspace = true }
futures = { workspace = true }
progenitor-client = { version = "0.11.0" }
reqwest = { version = "0.12", features = ["json", "stream"], default-features = false }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
regress = "0.10"
chrono = { workspace = true, features = ["serde"] }

[build-dependencies]
prettyplease = "0.2.22"
progenitor = { version = "0.11.0" }
serde_json = { workspace = true }
syn = "2.0"
