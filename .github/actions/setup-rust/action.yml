name: Setup Rust Toolchain
description: Setup Rust nightly, Depot, musl-tools, and optional extras.

inputs:
  depot-project-id:
    description: Depot project id used for remote build caching.
    required: true
  repo-access-token:
    description: Token used for private cargo git dependencies.
    required: true
  targets:
    description: Newline-delimited Rust targets to install.
    required: false
    default: ""
  install-protoc:
    description: Install protobuf compiler for crates that need it.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup Rust nightly
      uses: dtolnay/rust-toolchain@nightly

    - name: Setup Depot
      uses: depot/setup-action@v1

    - name: Install sccache
      continue-on-error: true
      uses: mozilla-actions/sccache-action@v0.0.10
      with:
        # Avoid the action's latest-release API lookup, which can fail during
        # transient GitHub API outages. Cache setup is an optimization, so a
        # download failure must fall back to an uncached Rust build.
        version: v0.16.0

    - name: Configure git credentials for cargo git deps
      shell: bash
      run: |
        git config --global url."https://x-access-token:${{ inputs.repo-access-token }}@github.com/".insteadOf "https://github.com/"

    - name: Install protoc
      if: inputs.install-protoc == 'true'
      uses: arduino/setup-protoc@v3
      with:
        version: "27.x"
        repo-token: ${{ github.token }}

    - name: Install musl-tools
      shell: bash
      # Retry transient Ubuntu mirror failures; a dead mirror has killed CI
      # jobs before (apt exit code 100 after minutes of connection errors).
      run: |
        sudo apt-get -o Acquire::Retries=5 update
        sudo apt-get -o Acquire::Retries=5 install -y musl-tools

    - name: Add Rust targets
      if: inputs.targets != ''
      shell: bash
      run: |
        while IFS= read -r target; do
          if [ -n "$target" ]; then
            rustup target add "$target"
          fi
        done <<'EOF'
        ${{ inputs.targets }}
        EOF
