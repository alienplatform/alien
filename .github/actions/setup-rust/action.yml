name: Setup Rust Toolchain
description: Setup Rust nightly, Depot, musl-tools, and optional extras.

inputs:
  depot-project-id:
    description: Depot project id used for remote build caching.
    required: true
  repo-access-token:
    description: Token used for private cargo git dependencies.
    required: true
  targets:
    description: Newline-delimited Rust targets to install.
    required: false
    default: ""
  install-protoc:
    description: Install protobuf compiler for crates that need it.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup Rust nightly
      uses: dtolnay/rust-toolchain@nightly

    - name: Setup Depot
      uses: depot/setup-action@v1

    - name: Install sccache
      continue-on-error: true
      uses: mozilla-actions/sccache-action@v0.0.9
      with:
        # Avoid the action's latest-release API lookup, which can fail during
        # transient GitHub API outages. Cache setup is an optimization, so a
        # download failure must fall back to an uncached Rust build.
        version: v0.16.0

    - name: Configure git credentials for cargo git deps
      shell: bash
      run: |
        git config --global url."https://x-access-token:${{ inputs.repo-access-token }}@github.com/".insteadOf "https://github.com/"

    - name: Install musl-tools and protoc
      shell: bash
      run: |
        PACKAGES="musl-tools"
        if [ "${{ inputs.install-protoc }}" = "true" ]; then
          PACKAGES="$PACKAGES protobuf-compiler"
        fi
        sudo apt-get update && sudo apt-get install -y $PACKAGES

    - name: Add Rust targets
      if: inputs.targets != ''
      shell: bash
      run: |
        while IFS= read -r target; do
          if [ -n "$target" ]; then
            rustup target add "$target"
          fi
        done <<'EOF'
        ${{ inputs.targets }}
        EOF
