name: Cloud Client Tests

on:
  pull_request:
    paths:
      - 'crates/alien-aws-clients/**'
      - 'crates/alien-gcp-clients/**'
      - 'crates/alien-azure-clients/**'
      - 'crates/alien-client-core/**'
      - 'crates/alien-client-config/**'
      - 'crates/alien-error/**'
      - 'crates/alien-core/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  push:
    branches: [main]
    paths:
      - 'crates/alien-aws-clients/**'
      - 'crates/alien-gcp-clients/**'
      - 'crates/alien-azure-clients/**'
      - 'crates/alien-client-core/**'
      - 'crates/alien-client-config/**'
      - 'crates/alien-error/**'
      - 'crates/alien-core/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    # Skip on fork PRs (no access to secrets)
    if: github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork
    strategy:
      fail-fast: false
      matrix:
        include:
          - cloud: aws
            test_cmd: depot cargo test -p alien-aws-clients --tests
          - cloud: gcp
            test_cmd: depot cargo test -p alien-gcp-clients --tests --features gcp
          - cloud: azure
            test_cmd: depot cargo test -p alien-azure-clients --tests
    runs-on: depot-ubuntu-24.04-arm-8
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Setup Depot
        uses: depot/setup-action@v1
        with:
          project: ${{ vars.DEPOT_PROJECT_ID }}

      - name: Install sccache
        uses: taiki-e/install-action@sccache

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - uses: 1password/install-cli-action@v1

      - name: Load .env.test from 1Password
        run: op document get "alien-test-env" --vault Engineering --output .env.test
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - run: ${{ matrix.test_cmd }}
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
