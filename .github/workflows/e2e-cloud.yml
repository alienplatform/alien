name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      run_push_aws_cli:
        description: "Push / AWS / CLI"
        type: boolean
        default: true
      run_push_gcp_cli:
        description: "Push / GCP / CLI"
        type: boolean
        default: true
      run_push_azure_cli:
        description: "Push / Azure / CLI"
        type: boolean
        default: true
      run_push_aws_cloudformation:
        description: "Push / AWS / CloudFormation"
        type: boolean
        default: false
      run_push_aws_terraform:
        description: "Push / AWS / Terraform"
        type: boolean
        default: false
      run_push_gcp_terraform:
        description: "Push / GCP / Terraform"
        type: boolean
        default: false
      run_push_azure_terraform:
        description: "Push / Azure / Terraform"
        type: boolean
        default: false
      run_kubernetes_aws_terraform_helm:
        description: "Terraform + Helm Install on Kubernetes / AWS"
        type: boolean
        default: false
      run_kubernetes_gcp_terraform_helm:
        description: "Terraform + Helm Install on Kubernetes / GCP"
        type: boolean
        default: false
      run_kubernetes_azure_terraform_helm:
        description: "Terraform + Helm Install on Kubernetes / Azure"
        type: boolean
        default: false
      run_local_linux_agent:
        description: "Local / Linux / Agent"
        type: boolean
        default: true
      run_local_macos_agent:
        description: "Local / macOS / Agent"
        type: boolean
        default: false
      run_local_windows_agent:
        description: "Local / Windows / Agent"
        type: boolean
        default: false
      app:
        description: "App filter"
        type: choice
        default: "comprehensive-rust"
        options:
          - All
          - comprehensive-rust
          - comprehensive-ts
          - full-stack-microservices
      network_mode:
        description: "Cloud network mode"
        type: choice
        default: "none"
        options:
          - none
          - use-default
          - create
          - existing
      kubernetes_cluster_mode:
        description: "Kubernetes cluster mode for Terraform + Helm E2E"
        type: choice
        default: existing
        options:
          - existing
          - create
      build_images:
        description: "Build container images (disable to use latest/default images or explicit overrides)"
        type: boolean
        default: true
      base_image_override:
        description: "Optional alien-base image to use when skipping image builds"
        type: string
        default: ""
      operator_image_override:
        description: "Optional alien-operator image to use when skipping image builds"
        type: string
        default: ""
      skip_cleanup:
        description: "Skip post-test resource cleanup (useful for debugging)"
        type: boolean
        default: false
      test_filter:
        description: "Additional nextest filter expression (optional)"
        type: string
        default: ""
      foreground_agent:
        description: "Run local agent in foreground (no service install, no sudo)"
        type: boolean
        default: true
      aws_target:
        description: "AWS target account"
        type: choice
        default: aws-target-1
        options:
          - aws-target-1
      gcp_target:
        description: "GCP target project"
        type: choice
        default: gcp-target-3
        options:
          - gcp-target-1
          - gcp-target-2
          - gcp-target-3
      azure_target:
        description: "Azure target subscription"
        type: choice
        default: azure-target-1
        options:
          - azure-target-1
  merge_group:
  pull_request:
    types: [opened, reopened, synchronize, labeled]

permissions:
  contents: read
  id-token: write
  packages: write

env:
  ALIEN_E2E_SLOT: "03"

jobs:
  # ── Compute which tests, platforms, and architectures to run ────────
  # Centralises all event-gating and input-filtering so downstream jobs
  # only need a simple `if: needs.compute-matrix.outputs.<flag> == 'true'`.

  compute-matrix:
    runs-on: ubuntu-latest
    outputs:
      push_matrix: ${{ steps.set.outputs.push_matrix }}
      local_matrix: ${{ steps.set.outputs.local_matrix }}
      terraform_matrix: ${{ steps.set.outputs.terraform_matrix }}
      cloudformation_matrix: ${{ steps.set.outputs.cloudformation_matrix }}
      has_push: ${{ steps.set.outputs.has_push }}
      has_local: ${{ steps.set.outputs.has_local }}
      has_terraform: ${{ steps.set.outputs.has_terraform }}
      has_cloudformation: ${{ steps.set.outputs.has_cloudformation }}
      needs_x86_64: ${{ steps.set.outputs.needs_x86_64 }}
      needs_aarch64: ${{ steps.set.outputs.needs_aarch64 }}
      build_images: ${{ steps.set.outputs.build_images }}
      build_base_image: ${{ steps.set.outputs.build_base_image }}
      build_operator_image: ${{ steps.set.outputs.build_operator_image }}
      skip_cleanup: ${{ steps.set.outputs.skip_cleanup }}
      test_filter: ${{ steps.set.outputs.test_filter }}
      network_mode: ${{ steps.set.outputs.network_mode }}
    steps:
      - id: set
        run: |
          # Determine whether tests should run at all based on event type
          SHOULD_RUN=false
          case "${{ github.event_name }}" in
            workflow_dispatch|merge_group)
              SHOULD_RUN=true
              ;;
            pull_request)
              IS_FORK="${{ github.event.pull_request.head.repo.fork }}"
              HAS_LABEL="${{ contains(join(github.event.pull_request.labels.*.name, ','), 'run-e2e') }}"
              if [ "$IS_FORK" = "false" ] && [ "$HAS_LABEL" = "true" ]; then
                SHOULD_RUN=true
              fi
              ;;
          esac

          if [ "$SHOULD_RUN" = "false" ]; then
            echo 'push_matrix={"include":[]}' >> $GITHUB_OUTPUT
            echo 'local_matrix={"include":[]}' >> $GITHUB_OUTPUT
            echo 'terraform_matrix={"include":[]}' >> $GITHUB_OUTPUT
            echo 'cloudformation_matrix={"include":[]}' >> $GITHUB_OUTPUT
            echo "has_push=false" >> $GITHUB_OUTPUT
            echo "has_local=false" >> $GITHUB_OUTPUT
            echo "has_terraform=false" >> $GITHUB_OUTPUT
            echo "has_cloudformation=false" >> $GITHUB_OUTPUT
            echo "needs_x86_64=false" >> $GITHUB_OUTPUT
            echo "needs_aarch64=false" >> $GITHUB_OUTPUT
            echo "build_images=true" >> $GITHUB_OUTPUT
            echo "build_base_image=true" >> $GITHUB_OUTPUT
            echo "build_operator_image=true" >> $GITHUB_OUTPUT
            echo "skip_cleanup=true" >> $GITHUB_OUTPUT
            echo "test_filter=" >> $GITHUB_OUTPUT
            echo "network_mode=none" >> $GITHUB_OUTPUT
            exit 0
          fi

          # For workflow_dispatch, use explicit checkboxes for the product
          # flows.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PUSH_AWS_CLI="${{ inputs.run_push_aws_cli }}"
            PUSH_GCP_CLI="${{ inputs.run_push_gcp_cli }}"
            PUSH_AZURE_CLI="${{ inputs.run_push_azure_cli }}"
            PUSH_AWS_CLOUDFORMATION="${{ inputs.run_push_aws_cloudformation }}"
            PUSH_AWS_TERRAFORM="${{ inputs.run_push_aws_terraform }}"
            PUSH_GCP_TERRAFORM="${{ inputs.run_push_gcp_terraform }}"
            PUSH_AZURE_TERRAFORM="${{ inputs.run_push_azure_terraform }}"
            KUBERNETES_AWS_TERRAFORM_HELM="${{ inputs.run_kubernetes_aws_terraform_helm }}"
            KUBERNETES_GCP_TERRAFORM_HELM="${{ inputs.run_kubernetes_gcp_terraform_helm }}"
            KUBERNETES_AZURE_TERRAFORM_HELM="${{ inputs.run_kubernetes_azure_terraform_helm }}"
            LOCAL_LINUX_AGENT="${{ inputs.run_local_linux_agent }}"
            LOCAL_MACOS_AGENT="${{ inputs.run_local_macos_agent }}"
            LOCAL_WINDOWS_AGENT="${{ inputs.run_local_windows_agent }}"
            APP="${{ inputs.app }}"
            NETWORK_MODE="${{ inputs.network_mode }}"
            BUILD_IMAGES="${{ inputs.build_images }}"
            BASE_IMAGE_OVERRIDE="${{ inputs.base_image_override }}"
            OPERATOR_IMAGE_OVERRIDE="${{ inputs.operator_image_override }}"
            SKIP_CLEANUP="${{ inputs.skip_cleanup }}"
            TEST_FILTER="${{ inputs.test_filter }}"
          else
            PUSH_AWS_CLI=true
            PUSH_GCP_CLI=false
            PUSH_AZURE_CLI=false
            PUSH_AWS_CLOUDFORMATION=false
            PUSH_AWS_TERRAFORM=false
            PUSH_GCP_TERRAFORM=false
            PUSH_AZURE_TERRAFORM=false
            KUBERNETES_AWS_TERRAFORM_HELM=false
            KUBERNETES_GCP_TERRAFORM_HELM=false
            KUBERNETES_AZURE_TERRAFORM_HELM=false
            LOCAL_LINUX_AGENT=true
            LOCAL_MACOS_AGENT=false
            LOCAL_WINDOWS_AGENT=false
            APP=comprehensive-rust; NETWORK_MODE=none; BUILD_IMAGES=true; BASE_IMAGE_OVERRIDE=""; OPERATOR_IMAGE_OVERRIDE=""; SKIP_CLEANUP=false; TEST_FILTER=""
          fi

          BUILD_BASE_IMAGE=$BUILD_IMAGES
          BUILD_AGENT_IMAGE=$BUILD_IMAGES
          if [ "$BUILD_IMAGES" != "true" ]; then
            BUILD_BASE_IMAGE=false
            BUILD_AGENT_IMAGE=false
          fi
          if [ -n "$BASE_IMAGE_OVERRIDE" ]; then
            BUILD_BASE_IMAGE=false
          fi
          if [ -n "$OPERATOR_IMAGE_OVERRIDE" ]; then
            BUILD_AGENT_IMAGE=false
          fi
          if [ "$BUILD_BASE_IMAGE" != "true" ] && [ "$BUILD_AGENT_IMAGE" != "true" ]; then
            BUILD_IMAGES=false
          fi

          # Build push matrix
          PUSH_ENTRIES='[]'
          if [ "$PUSH_AWS_CLI" = "true" ]; then
            if [ "$APP" = "All" ] || [ "$APP" = "comprehensive-rust" ]; then
              PUSH_ENTRIES=$(echo "$PUSH_ENTRIES" | jq -c '. + [{"name":"push-aws-comprehensive-rust","test_filter":"push_aws_comprehensive_rust","needs_oidc":false,"resource_suffix":"awscr"}]')
            fi
            if [ "$APP" = "All" ] || [ "$APP" = "comprehensive-ts" ]; then
              PUSH_ENTRIES=$(echo "$PUSH_ENTRIES" | jq -c '. + [{"name":"push-aws-comprehensive-ts","test_filter":"push_aws_comprehensive_ts","needs_oidc":false,"resource_suffix":"awsct"}]')
            fi
          fi
          if [ "$PUSH_GCP_CLI" = "true" ]; then
            if [ "$APP" = "All" ] || [ "$APP" = "comprehensive-rust" ]; then
              PUSH_ENTRIES=$(echo "$PUSH_ENTRIES" | jq -c '. + [{"name":"push-gcp-comprehensive-rust","test_filter":"push_gcp_comprehensive_rust","needs_oidc":false,"resource_suffix":"gcpcr"}]')
            fi
            if [ "$APP" = "All" ] || [ "$APP" = "comprehensive-ts" ]; then
              PUSH_ENTRIES=$(echo "$PUSH_ENTRIES" | jq -c '. + [{"name":"push-gcp-comprehensive-ts","test_filter":"push_gcp_comprehensive_ts","needs_oidc":false,"resource_suffix":"gcpct"}]')
            fi
          fi
          if [ "$PUSH_AZURE_CLI" = "true" ]; then
            if [ "$APP" = "All" ] || [ "$APP" = "comprehensive-rust" ]; then
              PUSH_ENTRIES=$(echo "$PUSH_ENTRIES" | jq -c '. + [{"name":"push-azure-comprehensive-rust","test_filter":"push_azure_comprehensive_rust","needs_oidc":true,"resource_suffix":"azcr"}]')
            fi
            if [ "$APP" = "All" ] || [ "$APP" = "comprehensive-ts" ]; then
              PUSH_ENTRIES=$(echo "$PUSH_ENTRIES" | jq -c '. + [{"name":"push-azure-comprehensive-ts","test_filter":"push_azure_comprehensive_ts","needs_oidc":true,"resource_suffix":"azct"}]')
            fi
          fi

          HAS_PUSH=$([ "$(echo "$PUSH_ENTRIES" | jq 'length')" -gt 0 ] && echo true || echo false)

          # Build local matrix (native agent on each OS)
          LOCAL_ENTRIES='[]'
          if [ "$LOCAL_LINUX_AGENT" = "true" ]; then
            if [ "$APP" = "All" ] || [ "$APP" = "comprehensive-rust" ]; then
              LOCAL_ENTRIES=$(echo "$LOCAL_ENTRIES" | jq -c '. + [{"name":"local-linux-comprehensive-rust","os":"depot-ubuntu-24.04-arm-8","test_filter":"pull_local_comprehensive_rust"}]')
            fi
            if [ "$APP" = "All" ] || [ "$APP" = "comprehensive-ts" ]; then
              LOCAL_ENTRIES=$(echo "$LOCAL_ENTRIES" | jq -c '. + [{"name":"local-linux-comprehensive-ts","os":"depot-ubuntu-24.04-arm-8","test_filter":"pull_local_comprehensive_ts"}]')
            fi
          fi
          if [ "$LOCAL_MACOS_AGENT" = "true" ]; then
            if [ "$APP" = "All" ] || [ "$APP" = "comprehensive-rust" ]; then
              LOCAL_ENTRIES=$(echo "$LOCAL_ENTRIES" | jq -c '. + [{"name":"local-macos-comprehensive-rust","os":"depot-macos-latest","test_filter":"pull_local_comprehensive_rust"}]')
            fi
            if [ "$APP" = "All" ] || [ "$APP" = "comprehensive-ts" ]; then
              LOCAL_ENTRIES=$(echo "$LOCAL_ENTRIES" | jq -c '. + [{"name":"local-macos-comprehensive-ts","os":"depot-macos-latest","test_filter":"pull_local_comprehensive_ts"}]')
            fi
          fi
          if [ "$LOCAL_WINDOWS_AGENT" = "true" ]; then
            if [ "$APP" = "All" ] || [ "$APP" = "comprehensive-rust" ]; then
              LOCAL_ENTRIES=$(echo "$LOCAL_ENTRIES" | jq -c '. + [{"name":"local-windows-comprehensive-rust","os":"depot-windows-2025-8","test_filter":"pull_local_comprehensive_rust"}]')
            fi
            if [ "$APP" = "All" ] || [ "$APP" = "comprehensive-ts" ]; then
              LOCAL_ENTRIES=$(echo "$LOCAL_ENTRIES" | jq -c '. + [{"name":"local-windows-comprehensive-ts","os":"depot-windows-2025-8","test_filter":"pull_local_comprehensive_ts"}]')
            fi
          fi

          HAS_LOCAL=$([ "$(echo "$LOCAL_ENTRIES" | jq 'length')" -gt 0 ] && echo true || echo false)

          # Build Terraform distribution matrix. Kubernetes entries provision
          # frozen resources with Terraform and install the agent with Helm.
          TERRAFORM_ENTRIES='[]'
          if [ "$APP" = "All" ] || [ "$APP" = "comprehensive-rust" ]; then
            if [ "$PUSH_AWS_TERRAFORM" = "true" ]; then
              TERRAFORM_ENTRIES=$(echo "$TERRAFORM_ENTRIES" | jq -c '. + [{"name":"terraform-aws-push-comprehensive-rust","test_filter":"terraform_aws_push_comprehensive_rust","needs_oidc":false,"resource_suffix":"tfawscr"}]')
            fi
            if [ "$PUSH_GCP_TERRAFORM" = "true" ]; then
              TERRAFORM_ENTRIES=$(echo "$TERRAFORM_ENTRIES" | jq -c '. + [{"name":"terraform-gcp-push-comprehensive-rust","test_filter":"terraform_gcp_push_comprehensive_rust","needs_oidc":false,"resource_suffix":"tfgcpcr"}]')
            fi
            if [ "$PUSH_AZURE_TERRAFORM" = "true" ]; then
              TERRAFORM_ENTRIES=$(echo "$TERRAFORM_ENTRIES" | jq -c '. + [{"name":"terraform-azure-push-comprehensive-rust","test_filter":"terraform_azure_push_comprehensive_rust","needs_oidc":true,"resource_suffix":"tfazcr"}]')
            fi
            if [ "$KUBERNETES_AWS_TERRAFORM_HELM" = "true" ]; then
              TERRAFORM_ENTRIES=$(echo "$TERRAFORM_ENTRIES" | jq -c '. + [{"name":"terraform-eks-helm-pull-comprehensive-rust","test_filter":"terraform_eks_helm_pull_comprehensive_rust","needs_oidc":false,"resource_suffix":"tfekscr"}]')
            fi
            if [ "$KUBERNETES_GCP_TERRAFORM_HELM" = "true" ]; then
              TERRAFORM_ENTRIES=$(echo "$TERRAFORM_ENTRIES" | jq -c '. + [{"name":"terraform-gke-helm-pull-comprehensive-rust","test_filter":"terraform_gke_helm_pull_comprehensive_rust","needs_oidc":false,"resource_suffix":"tfgkecr"}]')
            fi
            if [ "$KUBERNETES_AZURE_TERRAFORM_HELM" = "true" ]; then
              TERRAFORM_ENTRIES=$(echo "$TERRAFORM_ENTRIES" | jq -c '. + [{"name":"terraform-aks-helm-pull-comprehensive-rust","test_filter":"terraform_aks_helm_pull_comprehensive_rust","needs_oidc":true,"resource_suffix":"tfakscr"}]')
            fi
          fi
          if [ "$APP" = "All" ] || [ "$APP" = "full-stack-microservices" ]; then
            if [ "$KUBERNETES_AWS_TERRAFORM_HELM" = "true" ]; then
              TERRAFORM_ENTRIES=$(echo "$TERRAFORM_ENTRIES" | jq -c '. + [{"name":"terraform-eks-helm-pull-full-stack-microservices","test_filter":"terraform_eks_helm_pull_full_stack_microservices","needs_oidc":false,"resource_suffix":"tfeksfs"}]')
            fi
            if [ "$KUBERNETES_GCP_TERRAFORM_HELM" = "true" ]; then
              TERRAFORM_ENTRIES=$(echo "$TERRAFORM_ENTRIES" | jq -c '. + [{"name":"terraform-gke-helm-pull-full-stack-microservices","test_filter":"terraform_gke_helm_pull_full_stack_microservices","needs_oidc":false,"resource_suffix":"tfgkefs"}]')
            fi
            if [ "$KUBERNETES_AZURE_TERRAFORM_HELM" = "true" ]; then
              TERRAFORM_ENTRIES=$(echo "$TERRAFORM_ENTRIES" | jq -c '. + [{"name":"terraform-aks-helm-pull-full-stack-microservices","test_filter":"terraform_aks_helm_pull_full_stack_microservices","needs_oidc":true,"resource_suffix":"tfaksfs"}]')
            fi
          fi

          # Build CloudFormation distribution matrix. CloudFormation is AWS-only
          # and currently validates the push/import path.
          CLOUDFORMATION_ENTRIES='[]'
          if [ "$PUSH_AWS_CLOUDFORMATION" = "true" ]; then
            if [ "$APP" = "All" ] || [ "$APP" = "comprehensive-rust" ]; then
              CLOUDFORMATION_ENTRIES=$(echo "$CLOUDFORMATION_ENTRIES" | jq -c '. + [{"name":"cloudformation-aws-push-comprehensive-rust","test_filter":"cloudformation_aws_push_comprehensive_rust","needs_oidc":false,"resource_suffix":"cfawscr"}]')
            fi
          fi

          HAS_TERRAFORM=$([ "$(echo "$TERRAFORM_ENTRIES" | jq 'length')" -gt 0 ] && echo true || echo false)
          HAS_CLOUDFORMATION=$([ "$(echo "$CLOUDFORMATION_ENTRIES" | jq 'length')" -gt 0 ] && echo true || echo false)

          # Architecture needs: AWS→aarch64, GCP/Azure→x86_64
          ANY_TESTS=false
          if [ "$HAS_PUSH" = "true" ] || [ "$HAS_TERRAFORM" = "true" ] || [ "$HAS_CLOUDFORMATION" = "true" ]; then ANY_TESTS=true; fi

          NEEDS_X86_64=false
          NEEDS_AARCH64=false
          if [ "$ANY_TESTS" = "true" ]; then
            if [ "$PUSH_GCP_CLI" = "true" ] || [ "$PUSH_AZURE_CLI" = "true" ]; then NEEDS_X86_64=true; fi
            if [ "$PUSH_AWS_CLI" = "true" ]; then NEEDS_AARCH64=true; fi
          fi
          # Distribution tests run on ARM runners. K8s Terraform+Helm tests also
          # consume the operator image, so keep both architectures available.
          if [ "$HAS_TERRAFORM" = "true" ]; then NEEDS_X86_64=true; NEEDS_AARCH64=true; fi
          if [ "$HAS_CLOUDFORMATION" = "true" ]; then NEEDS_AARCH64=true; fi

          echo "push_matrix=$(echo "$PUSH_ENTRIES" | jq -c '{include: .}')" >> $GITHUB_OUTPUT
          echo "local_matrix=$(echo "$LOCAL_ENTRIES" | jq -c '{include: .}')" >> $GITHUB_OUTPUT
          echo "terraform_matrix=$(echo "$TERRAFORM_ENTRIES" | jq -c '{include: .}')" >> $GITHUB_OUTPUT
          echo "cloudformation_matrix=$(echo "$CLOUDFORMATION_ENTRIES" | jq -c '{include: .}')" >> $GITHUB_OUTPUT
          echo "has_push=$HAS_PUSH" >> $GITHUB_OUTPUT
          echo "has_local=$HAS_LOCAL" >> $GITHUB_OUTPUT
          echo "has_terraform=$HAS_TERRAFORM" >> $GITHUB_OUTPUT
          echo "has_cloudformation=$HAS_CLOUDFORMATION" >> $GITHUB_OUTPUT
          echo "needs_x86_64=$NEEDS_X86_64" >> $GITHUB_OUTPUT
          echo "needs_aarch64=$NEEDS_AARCH64" >> $GITHUB_OUTPUT
          echo "build_images=$BUILD_IMAGES" >> $GITHUB_OUTPUT
          echo "build_base_image=$BUILD_BASE_IMAGE" >> $GITHUB_OUTPUT
          echo "build_operator_image=$BUILD_AGENT_IMAGE" >> $GITHUB_OUTPUT
          echo "skip_cleanup=$SKIP_CLEANUP" >> $GITHUB_OUTPUT
          echo "test_filter=$TEST_FILTER" >> $GITHUB_OUTPUT
          echo "network_mode=$NETWORK_MODE" >> $GITHUB_OUTPUT

  # ── Build alien-runtime + alien-operator for needed architectures ─────
  # Combined into one cargo invocation per arch to share compilation of
  # common dependencies (tokio, reqwest, serde, platform clients, etc.).

  build-x86_64:
    needs: [compute-matrix]
    if: >-
      needs.compute-matrix.outputs.build_images == 'true' &&
      needs.compute-matrix.outputs.needs_x86_64 == 'true'
    runs-on: depot-ubuntu-24.04-16
    timeout-minutes: 45
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-rust
        with:
          depot-project-id: ${{ vars.DEPOT_PROJECT_ID }}
          repo-access-token: ${{ secrets.REPO_ACCESS_TOKEN }}
          targets: x86_64-unknown-linux-musl
          install-protoc: "true"

      - name: Build alien-runtime + alien-operator (x86_64)
        run: |
          PACKAGES=()
          if [ "${{ needs.compute-matrix.outputs.build_base_image }}" = "true" ]; then
            PACKAGES+=("-p" "alien-runtime")
          fi
          if [ "${{ needs.compute-matrix.outputs.build_operator_image }}" = "true" ]; then
            PACKAGES+=("-p" "alien-operator")
          fi
          depot cargo build --release "${PACKAGES[@]}" --target x86_64-unknown-linux-musl

      - uses: actions/upload-artifact@v4
        if: needs.compute-matrix.outputs.build_base_image == 'true'
        with:
          name: alien-runtime-x86_64
          path: target/x86_64-unknown-linux-musl/release/alien-runtime
          retention-days: 1

      - uses: actions/upload-artifact@v4
        if: needs.compute-matrix.outputs.build_operator_image == 'true'
        with:
          name: alien-operator-x86_64
          path: target/x86_64-unknown-linux-musl/release/alien-operator
          retention-days: 1

  build-aarch64:
    needs: [compute-matrix]
    if: >-
      needs.compute-matrix.outputs.build_images == 'true' &&
      needs.compute-matrix.outputs.needs_aarch64 == 'true'
    runs-on: depot-ubuntu-24.04-arm-16
    timeout-minutes: 45
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-rust
        with:
          depot-project-id: ${{ vars.DEPOT_PROJECT_ID }}
          repo-access-token: ${{ secrets.REPO_ACCESS_TOKEN }}
          targets: aarch64-unknown-linux-musl
          install-protoc: "true"

      - name: Build alien-runtime + alien-operator (aarch64)
        run: |
          PACKAGES=()
          if [ "${{ needs.compute-matrix.outputs.build_base_image }}" = "true" ]; then
            PACKAGES+=("-p" "alien-runtime")
          fi
          if [ "${{ needs.compute-matrix.outputs.build_operator_image }}" = "true" ]; then
            PACKAGES+=("-p" "alien-operator")
          fi
          depot cargo build --release "${PACKAGES[@]}" --target aarch64-unknown-linux-musl

      - uses: actions/upload-artifact@v4
        if: needs.compute-matrix.outputs.build_base_image == 'true'
        with:
          name: alien-runtime-aarch64
          path: target/aarch64-unknown-linux-musl/release/alien-runtime
          retention-days: 1

      - uses: actions/upload-artifact@v4
        if: needs.compute-matrix.outputs.build_operator_image == 'true'
        with:
          name: alien-operator-aarch64
          path: target/aarch64-unknown-linux-musl/release/alien-operator
          retention-days: 1

  # ── Build container images ─────────────────────────────────────────

  build-base-image:
    needs: [compute-matrix, build-x86_64, build-aarch64]
    if: |
      !cancelled() && !failure() &&
      needs.compute-matrix.outputs.build_base_image == 'true' &&
      (needs.build-x86_64.result == 'success' || needs.build-aarch64.result == 'success')
    runs-on: depot-ubuntu-24.04-arm
    timeout-minutes: 15
    outputs:
      base_image: ghcr.io/alienplatform/alien-base:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        if: needs.build-x86_64.result == 'success'
        with:
          name: alien-runtime-x86_64
          path: target/x86_64-unknown-linux-musl/release/

      - uses: actions/download-artifact@v4
        if: needs.build-aarch64.result == 'success'
        with:
          name: alien-runtime-aarch64
          path: target/aarch64-unknown-linux-musl/release/

      - name: Ensure binary dirs exist and make executable
        run: |
          # Create placeholder dirs for skipped architectures so Dockerfile COPY doesn't fail
          mkdir -p target/x86_64-unknown-linux-musl/release target/aarch64-unknown-linux-musl/release
          # Create empty placeholder binaries for skipped architectures
          [ ! -f target/x86_64-unknown-linux-musl/release/alien-runtime ] && touch target/x86_64-unknown-linux-musl/release/alien-runtime
          [ ! -f target/aarch64-unknown-linux-musl/release/alien-runtime ] && touch target/aarch64-unknown-linux-musl/release/alien-runtime
          chmod +x target/*/release/alien-runtime

      - name: Compute Docker platforms
        id: platforms
        run: |
          PLATFORMS=""
          if [ "${{ needs.build-x86_64.result }}" = "success" ]; then
            PLATFORMS="linux/amd64"
          fi
          if [ "${{ needs.build-aarch64.result }}" = "success" ]; then
            [ -n "$PLATFORMS" ] && PLATFORMS="$PLATFORMS,"
            PLATFORMS="${PLATFORMS}linux/arm64"
          fi
          echo "platforms=$PLATFORMS" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: depot/setup-action@v1

      - name: Build and push alien-base
        uses: depot/build-push-action@v1
        with:
          project: ${{ vars.DEPOT_PROJECT_ID }}
          context: .
          file: docker/Dockerfile.alien-base
          platforms: ${{ steps.platforms.outputs.platforms }}
          push: true
          tags: ghcr.io/alienplatform/alien-base:${{ github.sha }}
          provenance: false

  build-operator-image:
    needs: [compute-matrix, build-x86_64, build-aarch64]
    if: |
      !cancelled() && !failure() &&
      needs.compute-matrix.outputs.build_operator_image == 'true' &&
      (needs.build-x86_64.result == 'success' || needs.build-aarch64.result == 'success')
    runs-on: depot-ubuntu-24.04-arm
    timeout-minutes: 15
    outputs:
      operator_image: ghcr.io/alienplatform/alien-operator:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        if: needs.build-x86_64.result == 'success'
        with:
          name: alien-operator-x86_64
          path: target/x86_64-unknown-linux-musl/release/

      - uses: actions/download-artifact@v4
        if: needs.build-aarch64.result == 'success'
        with:
          name: alien-operator-aarch64
          path: target/aarch64-unknown-linux-musl/release/

      - name: Ensure binary dirs exist and make executable
        run: |
          mkdir -p target/x86_64-unknown-linux-musl/release target/aarch64-unknown-linux-musl/release
          [ ! -f target/x86_64-unknown-linux-musl/release/alien-operator ] && touch target/x86_64-unknown-linux-musl/release/alien-operator
          [ ! -f target/aarch64-unknown-linux-musl/release/alien-operator ] && touch target/aarch64-unknown-linux-musl/release/alien-operator
          chmod +x target/*/release/alien-operator

      - name: Compute Docker platforms
        id: platforms
        run: |
          PLATFORMS=""
          if [ "${{ needs.build-x86_64.result }}" = "success" ]; then
            PLATFORMS="linux/amd64"
          fi
          if [ "${{ needs.build-aarch64.result }}" = "success" ]; then
            [ -n "$PLATFORMS" ] && PLATFORMS="$PLATFORMS,"
            PLATFORMS="${PLATFORMS}linux/arm64"
          fi
          echo "platforms=$PLATFORMS" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: depot/setup-action@v1

      - name: Build and push alien-operator
        uses: depot/build-push-action@v1
        with:
          project: ${{ vars.DEPOT_PROJECT_ID }}
          context: .
          file: docker/Dockerfile.alien-operator
          platforms: ${{ steps.platforms.outputs.platforms }}
          push: true
          tags: ghcr.io/alienplatform/alien-operator:${{ github.sha }}
          provenance: false

  # ── Terraform setup ─────────────────────────────────────────────────

  setup:
    needs: [compute-matrix]
    if: |
      needs.compute-matrix.outputs.has_push == 'true' ||
      needs.compute-matrix.outputs.has_local == 'true' ||
      needs.compute-matrix.outputs.has_terraform == 'true' ||
      needs.compute-matrix.outputs.has_cloudformation == 'true'
    # Prevent concurrent terraform applies on the same workspace
    concurrency:
      group: terraform-test-infra
      cancel-in-progress: false
    runs-on: depot-ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Mask non-secret infrastructure identifiers
        run: |
          # vars.* are not auto-masked by GitHub (only secrets.* are)
          echo "::add-mask::${{ vars.TEST_GCP_MGMT_PROJECT_ID }}"
          echo "::add-mask::${{ vars.TEST_GCP_TARGET_PROJECT_ID }}"
          echo "::add-mask::${{ vars.TEST_GCP_TARGET_1_PROJECT_ID }}"
          echo "::add-mask::${{ vars.TEST_GCP_TARGET_2_PROJECT_ID }}"
          echo "::add-mask::${{ vars.TEST_GCP_TARGET_3_PROJECT_ID }}"

      - name: Terraform init
        working-directory: infra/test
        run: terraform init
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

      - name: Import existing EKS bootstrap resources
        if: inputs.run_kubernetes_aws_terraform_helm == true
        working-directory: infra/test
        run: |
          set -euo pipefail

          if ! command -v aws >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y awscli
          fi

          cluster_name="$(terraform output -raw e2e_eks_cluster_name 2>/dev/null || true)"
          if [ -z "$cluster_name" ]; then
            echo "No existing EKS cluster output found; Terraform will create the OIDC provider if needed."
            exit 0
          fi

          region="$(terraform output -raw target_aws_region)"
          account_id="$(terraform output -raw target_aws_account_id)"
          issuer="$(aws eks describe-cluster \
            --name "$cluster_name" \
            --region "$region" \
            --query 'cluster.identity.oidc.issuer' \
            --output text 2>/dev/null || true)"

          if [ -z "$issuer" ] || [ "$issuer" = "None" ]; then
            echo "No existing EKS OIDC issuer found for $cluster_name; Terraform will create the provider if needed."
            exit 0
          fi

          provider_path="${issuer#https://}"
          provider_arn="arn:aws:iam::${account_id}:oidc-provider/${provider_path}"

          if terraform state show module.aws.aws_iam_openid_connect_provider.e2e_eks >/dev/null 2>&1; then
            echo "EKS OIDC provider is already managed by Terraform state."
          elif aws iam get-open-id-connect-provider --open-id-connect-provider-arn "$provider_arn" >/dev/null 2>&1; then
            terraform import module.aws.aws_iam_openid_connect_provider.e2e_eks "$provider_arn"
          else
            echo "EKS OIDC provider $provider_arn does not exist; Terraform will create it."
          fi

          suffix="$(terraform state show module.aws.random_id.suffix | awk -F'"' '/hex =/ { print $2; exit }')"
          if [ -z "$suffix" ]; then
            echo "Could not resolve shared EKS suffix; Terraform will create missing bootstrap resources if needed."
            exit 0
          fi

          ebs_role_name="alien-e2e-eks-ebs-csi-${suffix}"
          if ! terraform state show module.aws.aws_iam_role.e2e_eks_ebs_csi >/dev/null 2>&1; then
            if aws iam get-role --role-name "$ebs_role_name" >/dev/null 2>&1; then
              terraform import module.aws.aws_iam_role.e2e_eks_ebs_csi "$ebs_role_name"
            else
              echo "EKS EBS CSI role $ebs_role_name does not exist; Terraform will create it."
            fi
          fi

          ebs_policy_arn="arn:aws:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy"
          if ! terraform state show module.aws.aws_iam_role_policy_attachment.e2e_eks_ebs_csi >/dev/null 2>&1; then
            if aws iam list-attached-role-policies --role-name "$ebs_role_name" \
              --query "AttachedPolicies[?PolicyArn=='${ebs_policy_arn}'].PolicyArn | [0]" \
              --output text 2>/dev/null | grep -qx "$ebs_policy_arn"; then
              terraform import module.aws.aws_iam_role_policy_attachment.e2e_eks_ebs_csi "${ebs_role_name}/${ebs_policy_arn}"
            else
              echo "EKS EBS CSI policy attachment does not exist; Terraform will create it."
            fi
          fi

          if ! terraform state show module.aws.aws_eks_addon.e2e_ebs_csi >/dev/null 2>&1; then
            if aws eks describe-addon --cluster-name "$cluster_name" --addon-name aws-ebs-csi-driver --region "$region" >/dev/null 2>&1; then
              terraform import module.aws.aws_eks_addon.e2e_ebs_csi "${cluster_name}:aws-ebs-csi-driver"
            else
              echo "EKS EBS CSI add-on does not exist; Terraform will create it."
            fi
          fi
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_aws_management_access_key_id: ${{ secrets.TEST_AWS_MGMT_ACCESS_KEY_ID }}
          TF_VAR_aws_management_secret_access_key: ${{ secrets.TEST_AWS_MGMT_SECRET_ACCESS_KEY }}
          TF_VAR_aws_target_access_key_id: ${{ secrets.TEST_AWS_TARGET_ACCESS_KEY_ID }}
          TF_VAR_aws_target_secret_access_key: ${{ secrets.TEST_AWS_TARGET_SECRET_ACCESS_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.TEST_AWS_TARGET_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TEST_AWS_TARGET_SECRET_ACCESS_KEY }}
          TF_VAR_google_management_service_account_key: ${{ secrets.TEST_GCP_MGMT_SA_KEY }}
          TF_VAR_google_management_project_id: ${{ vars.TEST_GCP_MGMT_PROJECT_ID }}
          TF_VAR_google_target_service_account_key: ${{ secrets.TEST_GCP_TARGET_SA_KEY }}
          TF_VAR_google_target_project_id: ${{ vars.TEST_GCP_TARGET_PROJECT_ID }}
          TF_VAR_google_target_1_service_account_key: ${{ secrets.TEST_GCP_TARGET_1_SA_KEY }}
          TF_VAR_google_target_1_project_id: ${{ vars.TEST_GCP_TARGET_1_PROJECT_ID }}
          TF_VAR_google_target_3_service_account_key: ${{ secrets.TEST_GCP_TARGET_3_SA_KEY }}
          TF_VAR_google_target_3_project_id: ${{ vars.TEST_GCP_TARGET_3_PROJECT_ID }}
          TF_VAR_azure_management_subscription_id: ${{ secrets.TEST_AZURE_MGMT_SUBSCRIPTION_ID }}
          TF_VAR_azure_management_tenant_id: ${{ secrets.TEST_AZURE_MGMT_TENANT_ID }}
          TF_VAR_azure_management_client_id: ${{ secrets.TEST_AZURE_MGMT_CLIENT_ID }}
          TF_VAR_azure_management_client_secret: ${{ secrets.TEST_AZURE_MGMT_CLIENT_SECRET }}
          TF_VAR_azure_target_subscription_id: ${{ secrets.TEST_AZURE_TARGET_SUBSCRIPTION_ID }}
          TF_VAR_azure_target_tenant_id: ${{ secrets.TEST_AZURE_TARGET_TENANT_ID }}
          TF_VAR_azure_target_client_id: ${{ secrets.TEST_AZURE_TARGET_CLIENT_ID }}
          TF_VAR_azure_target_client_secret: ${{ secrets.TEST_AZURE_TARGET_CLIENT_SECRET }}

      - name: Terraform apply
        working-directory: infra/test
        run: terraform apply -auto-approve
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_aws_management_access_key_id: ${{ secrets.TEST_AWS_MGMT_ACCESS_KEY_ID }}
          TF_VAR_aws_management_secret_access_key: ${{ secrets.TEST_AWS_MGMT_SECRET_ACCESS_KEY }}
          TF_VAR_aws_target_access_key_id: ${{ secrets.TEST_AWS_TARGET_ACCESS_KEY_ID }}
          TF_VAR_aws_target_secret_access_key: ${{ secrets.TEST_AWS_TARGET_SECRET_ACCESS_KEY }}
          TF_VAR_google_management_service_account_key: ${{ secrets.TEST_GCP_MGMT_SA_KEY }}
          TF_VAR_google_management_project_id: ${{ vars.TEST_GCP_MGMT_PROJECT_ID }}
          TF_VAR_google_target_service_account_key: ${{ secrets.TEST_GCP_TARGET_SA_KEY }}
          TF_VAR_google_target_project_id: ${{ vars.TEST_GCP_TARGET_PROJECT_ID }}
          TF_VAR_google_target_1_service_account_key: ${{ secrets.TEST_GCP_TARGET_1_SA_KEY }}
          TF_VAR_google_target_1_project_id: ${{ vars.TEST_GCP_TARGET_1_PROJECT_ID }}
          TF_VAR_google_target_3_service_account_key: ${{ secrets.TEST_GCP_TARGET_3_SA_KEY }}
          TF_VAR_google_target_3_project_id: ${{ vars.TEST_GCP_TARGET_3_PROJECT_ID }}
          TF_VAR_azure_management_subscription_id: ${{ secrets.TEST_AZURE_MGMT_SUBSCRIPTION_ID }}
          TF_VAR_azure_management_tenant_id: ${{ secrets.TEST_AZURE_MGMT_TENANT_ID }}
          TF_VAR_azure_management_client_id: ${{ secrets.TEST_AZURE_MGMT_CLIENT_ID }}
          TF_VAR_azure_management_client_secret: ${{ secrets.TEST_AZURE_MGMT_CLIENT_SECRET }}
          TF_VAR_azure_target_subscription_id: ${{ secrets.TEST_AZURE_TARGET_SUBSCRIPTION_ID }}
          TF_VAR_azure_target_tenant_id: ${{ secrets.TEST_AZURE_TARGET_TENANT_ID }}
          TF_VAR_azure_target_client_id: ${{ secrets.TEST_AZURE_TARGET_CLIENT_ID }}
          TF_VAR_azure_target_client_secret: ${{ secrets.TEST_AZURE_TARGET_CLIENT_SECRET }}

      - uses: azure/setup-helm@v4

      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Install Kubernetes auth helpers
        run: |
          if ! command -v aws >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y awscli unzip
          fi
          case "$(uname -m)" in
            aarch64|arm64) KUBELOGIN_ARCH=arm64 ;;
            x86_64|amd64) KUBELOGIN_ARCH=amd64 ;;
            *) echo "Unsupported kubelogin architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          curl -fsSL -o /tmp/kubelogin.zip "https://github.com/Azure/kubelogin/releases/download/v0.2.17/kubelogin-linux-${KUBELOGIN_ARCH}.zip"
          unzip -q /tmp/kubelogin.zip -d /tmp/kubelogin
          sudo install -m 0755 "/tmp/kubelogin/bin/linux_${KUBELOGIN_ARCH}/kubelogin" /usr/local/bin/kubelogin

      - name: Configure provider-native E2E ingress
        run: ./scripts/configure-e2e-provider-ingress.sh
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          ALIEN_E2E_CONFIGURE_EKS: ${{ inputs.run_kubernetes_aws_terraform_helm && 'true' || 'false' }}
          ALIEN_E2E_CONFIGURE_GKE: ${{ inputs.run_kubernetes_gcp_terraform_helm && 'true' || 'false' }}
          ALIEN_E2E_CONFIGURE_AKS: ${{ inputs.run_kubernetes_azure_terraform_helm && 'true' || 'false' }}
          ALIEN_E2E_GCP_TARGET: ${{ inputs.gcp_target || 'gcp-target-3' }}

      - name: Set up Azure OIDC token
        run: |
          # All e2e jobs declare `environment: e2e-tests`, so GitHub emits
          # OIDC tokens with `sub: repo:OWNER/REPO:environment:e2e-tests`
          # regardless of branch or event. One Terraform-managed FIC covers
          # main pushes, PRs, and workflow_dispatch on feature branches.
          SUBJECT="repo:${{ github.repository }}:environment:e2e-tests"
          echo "Setting AZURE_MANAGEMENT_OIDC_SUBJECT=$SUBJECT"
          echo "AZURE_MANAGEMENT_OIDC_SUBJECT=$SUBJECT" >> $GITHUB_ENV
          echo "AZURE_MANAGEMENT_OIDC_ISSUER=https://token.actions.githubusercontent.com" >> $GITHUB_ENV

      - name: Generate .env.test
        run: |
          ./scripts/gen-env-test.sh
          cp .env.test .env.test.1password
          ./scripts/select-e2e-targets.sh \
            --env-file .env.test.1password \
            --aws aws-target-1 \
            --gcp gcp-target-3 \
            --azure azure-target-1
          ./scripts/select-e2e-targets.sh \
            --env-file .env.test \
            --aws "${{ inputs.aws_target || 'aws-target-1' }}" \
            --gcp "${{ inputs.gcp_target || 'gcp-target-3' }}" \
            --azure "${{ inputs.azure_target || 'azure-target-1' }}"
          printf "\nALIEN_E2E_SLOT='%s'\n" "$ALIEN_E2E_SLOT" >> .env.test
          printf "\nALIEN_E2E_SLOT='%s'\n" "$ALIEN_E2E_SLOT" >> .env.test.1password
          printf "\nALIEN_E2E_KUBERNETES_CLUSTER_MODE='%s'\n" "${{ inputs.kubernetes_cluster_mode || 'existing' }}" >> .env.test
          printf "\nALIEN_E2E_KUBERNETES_CLUSTER_MODE='%s'\n" "${{ inputs.kubernetes_cluster_mode || 'existing' }}" >> .env.test.1password
          echo "--- verifying .env.test exists ---"
          ls -la .env.test
          wc -l .env.test
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          AXIOM_TOKEN: ${{ secrets.AXIOM_CI_API_KEY }}
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}

      - name: Mask all .env.test values
        run: |
          while IFS= read -r line; do
            [[ "$line" =~ ^#.*$ || -z "$line" ]] && continue
            val="${line#*=}"
            val="${val#\'}" && val="${val%\'}"
            val="${val#\"}" && val="${val%\"}"
            [ -n "$val" ] && echo "::add-mask::$val"
          done < .env.test

      - name: Pre-clean stale AWS E2E resources
        if: |
          needs.compute-matrix.outputs.has_push == 'true' ||
          needs.compute-matrix.outputs.has_terraform == 'true' ||
          needs.compute-matrix.outputs.has_cloudformation == 'true'
        continue-on-error: true
        run: |
          set -a && source .env.test && set +a
          export AWS_ACCESS_KEY_ID="$AWS_TARGET_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$AWS_TARGET_SECRET_ACCESS_KEY"
          export AWS_SESSION_TOKEN="${AWS_TARGET_SESSION_TOKEN:-}"
          export AWS_DEFAULT_REGION="$AWS_TARGET_REGION"
          for suffix in "" "-awscr" "-awsct" "-cfawscr" "-tfawscr" "-tfekscr" "-tfeksfs" "-awsr" "-awst" "-cfaws" "-tfaws" "-tfeks"; do
            export ALIEN_E2E_RESOURCE_PREFIX="e2e-${ALIEN_E2E_SLOT}${suffix}"
            ./scripts/cleanup-aws-e2e-resources.sh
          done

      - name: Upload .env.test artifact
        uses: actions/upload-artifact@v4
        with:
          name: env-test-e2e
          path: |
            .env.test
            .alien-kubeconfigs/
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v1

      - name: Upload .env.test to 1Password (for local dev)
        run: |
          if op document get alien-test-env --vault "$OP_VAULT_NAME" > /dev/null 2>&1; then
            op document edit alien-test-env .env.test.1password --vault "$OP_VAULT_NAME"
          else
            op document create .env.test.1password --title alien-test-env --vault "$OP_VAULT_NAME"
          fi
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_VAULT_NAME: ${{ secrets.OP_VAULT_NAME }}

  # ── E2E push test matrix ───────────────────────────────────────────

  push-test:
    needs: [compute-matrix, setup, build-base-image]
    if: |
      !cancelled() && !failure() &&
      needs.compute-matrix.outputs.has_push == 'true'
    # The Azure FIC matches `sub: repo:OWNER/REPO:environment:e2e-tests`,
    # which GitHub emits when a job declares an environment. This makes the
    # OIDC subject branch-independent (works for main, PR, and feature-branch
    # workflow_dispatch alike).
    environment: e2e-tests
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.compute-matrix.outputs.push_matrix) }}
    runs-on: depot-ubuntu-24.04-arm-8
    timeout-minutes: 60
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Configure git credentials
        run: git config --global url."https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Download .env.test
        uses: actions/download-artifact@v4
        with:
          name: env-test-e2e

      - name: Acquire Azure OIDC token and start refresh loop
        if: matrix.needs_oidc
        run: |
          # Acquire initial OIDC token
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" | jq -r .value)
          echo "$TOKEN" > /tmp/azure-oidc-token
          echo "AZURE_FEDERATED_TOKEN_FILE=/tmp/azure-oidc-token" >> $GITHUB_ENV

          # Start background loop to refresh the token every 4 minutes
          # (GitHub OIDC tokens expire after 5 minutes)
          (
            while true; do
              sleep 240
              NEW_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
                "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" | jq -r .value)
              if [ -n "$NEW_TOKEN" ] && [ "$NEW_TOKEN" != "null" ]; then
                echo "$NEW_TOKEN" > /tmp/azure-oidc-token
              fi
            done
          ) &
          echo "OIDC_REFRESH_PID=$!" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@nightly

      - uses: depot/setup-action@v1

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: taiki-e/install-action@cargo-nextest

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - uses: oven-sh/setup-bun@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies and build packages
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm -C examples install --frozen-lockfile
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Mask sensitive values from .env.test
        run: |
          while IFS= read -r line; do
            # Skip comments and empty lines
            [[ "$line" =~ ^#.*$ || -z "$line" ]] && continue
            # Extract value (strip key= prefix, then surrounding quotes)
            val="${line#*=}"
            val="${val#\'}" && val="${val%\'}"
            val="${val#\"}" && val="${val%\"}"
            # Skip empty values and mask the rest
            [ -n "$val" ] && echo "::add-mask::$val"
          done < .env.test

      - name: Run E2E push test
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
          ALIEN_OVERRIDE_BASE_IMAGE: ${{ inputs.base_image_override || (needs.compute-matrix.outputs.build_base_image == 'true' && needs.build-base-image.outputs.base_image || '') }}
          ALIEN_E2E_NETWORK_MODE: ${{ needs.compute-matrix.outputs.network_mode }}
        run: |
          set -a && source .env.test && set +a
          export ALIEN_E2E_RESOURCE_PREFIX="e2e-${ALIEN_E2E_SLOT}-${{ matrix.resource_suffix }}"
          depot cargo nextest run -p alien-test --test push ${{ matrix.test_filter }} ${{ needs.compute-matrix.outputs.test_filter }} --no-capture

  # ── E2E CloudFormation distribution matrix ─────────────────────────

  cloudformation-test:
    needs: [compute-matrix, setup, build-base-image]
    if: |
      !cancelled() && !failure() &&
      needs.compute-matrix.outputs.has_cloudformation == 'true'
    environment: e2e-tests
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.compute-matrix.outputs.cloudformation_matrix) }}
    runs-on: depot-ubuntu-24.04-arm-8
    timeout-minutes: 75
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Configure git credentials
        run: git config --global url."https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Download .env.test
        uses: actions/download-artifact@v4
        with:
          name: env-test-e2e

      - uses: dtolnay/rust-toolchain@nightly

      - uses: depot/setup-action@v1

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: taiki-e/install-action@cargo-nextest

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - uses: oven-sh/setup-bun@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install CloudFormation linter
        run: pipx install cfn-lint

      - name: Install JS dependencies and build packages
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm -C examples install --frozen-lockfile
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Mask sensitive values from .env.test
        run: |
          while IFS= read -r line; do
            [[ "$line" =~ ^#.*$ || -z "$line" ]] && continue
            val="${line#*=}"
            val="${val#\'}" && val="${val%\'}"
            val="${val#\"}" && val="${val%\"}"
            [ -n "$val" ] && echo "::add-mask::$val"
          done < .env.test

      - name: Run E2E CloudFormation distribution test
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
          ALIEN_OVERRIDE_BASE_IMAGE: ${{ inputs.base_image_override || (needs.compute-matrix.outputs.build_base_image == 'true' && needs.build-base-image.outputs.base_image || '') }}
          ALIEN_E2E_NETWORK_MODE: ${{ needs.compute-matrix.outputs.network_mode }}
        run: |
          set -a && source .env.test && set +a
          export ALIEN_TEST_BUN_BINARY="$(command -v bun)"
          export ALIEN_E2E_RESOURCE_PREFIX="e2e-${ALIEN_E2E_SLOT}-${{ matrix.resource_suffix }}"
          depot cargo nextest run -p alien-test --test distribution ${{ matrix.test_filter }} ${{ needs.compute-matrix.outputs.test_filter }} --no-capture

  # ── E2E Terraform distribution matrix ──────────────────────────────

  terraform-test:
    needs: [compute-matrix, setup, build-base-image, build-operator-image]
    if: |
      !cancelled() && !failure() &&
      needs.compute-matrix.outputs.has_terraform == 'true'
    environment: e2e-tests
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.compute-matrix.outputs.terraform_matrix) }}
    runs-on: depot-ubuntu-24.04-16
    timeout-minutes: 90
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Configure git credentials
        run: git config --global url."https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Download .env.test
        uses: actions/download-artifact@v4
        with:
          name: env-test-e2e

      - name: Acquire Azure OIDC token and start refresh loop
        if: matrix.needs_oidc
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" | jq -r .value)
          echo "$TOKEN" > /tmp/azure-oidc-token
          echo "AZURE_FEDERATED_TOKEN_FILE=/tmp/azure-oidc-token" >> $GITHUB_ENV
          (
            while true; do
              sleep 240
              NEW_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
                "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" | jq -r .value)
              if [ -n "$NEW_TOKEN" ] && [ "$NEW_TOKEN" != "null" ]; then
                echo "$NEW_TOKEN" > /tmp/azure-oidc-token
              fi
            done
          ) &
          echo "OIDC_REFRESH_PID=$!" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        if: needs.compute-matrix.outputs.build_operator_image == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull operator image
        if: needs.compute-matrix.outputs.build_operator_image == 'true'
        run: docker pull ${{ needs.build-operator-image.outputs.operator_image }}

      - uses: dtolnay/rust-toolchain@nightly

      - uses: depot/setup-action@v1

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: taiki-e/install-action@cargo-nextest

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - uses: oven-sh/setup-bun@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - uses: azure/setup-helm@v4

      - uses: google-github-actions/setup-gcloud@v2
        if: contains(matrix.test_filter, 'gke')
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Install kubectl and kind
        run: |
          case "$(uname -m)" in
            x86_64) K8S_ARCH=amd64 ;;
            aarch64|arm64) K8S_ARCH=arm64 ;;
            *) echo "Unsupported Kubernetes tooling architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          curl -Lo kubectl "https://dl.k8s.io/release/v1.30.0/bin/linux/${K8S_ARCH}/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          curl -Lo kind "https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-${K8S_ARCH}"
          chmod +x kind
          sudo mv kind /usr/local/bin/kind

      - name: Install kubeconform
        run: |
          curl -L https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Install JS dependencies and build packages
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm -C examples install --frozen-lockfile
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Mask sensitive values from .env.test
        run: |
          while IFS= read -r line; do
            [[ "$line" =~ ^#.*$ || -z "$line" ]] && continue
            val="${line#*=}"
            val="${val#\'}" && val="${val%\'}"
            val="${val#\"}" && val="${val%\"}"
            [ -n "$val" ] && echo "::add-mask::$val"
          done < .env.test

      - name: Configure GKE kubeconfig auth
        if: contains(matrix.test_filter, 'gke')
        run: |
          set -a && source .env.test && set +a
          key_file="$(mktemp)"
          trap 'rm -f "$key_file"' EXIT
          printf '%s' "$GOOGLE_TARGET_SERVICE_ACCOUNT_KEY" > "$key_file"
          ./scripts/write-gke-kubeconfig.sh \
            --key-file "$key_file" \
            --project "$GOOGLE_TARGET_PROJECT_ID" \
            --cluster "$ALIEN_TEST_GKE_CLUSTER_NAME" \
            --location "$ALIEN_TEST_GKE_CLUSTER_LOCATION" \
            --kubeconfig "$ALIEN_TEST_GKE_KUBECONFIG"
          gke_context="$(KUBECONFIG="$ALIEN_TEST_GKE_KUBECONFIG" kubectl config current-context)"
          printf "\nALIEN_TEST_GKE_KUBE_CONTEXT='%s'\n" "$gke_context" >> .env.test

      - name: Run E2E Terraform distribution test
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
          ALIEN_OVERRIDE_BASE_IMAGE: ${{ inputs.base_image_override || (needs.compute-matrix.outputs.build_base_image == 'true' && needs.build-base-image.outputs.base_image || '') }}
          ALIEN_TEST_OVERRIDE_OPERATOR_IMAGE: ${{ inputs.operator_image_override || (needs.compute-matrix.outputs.build_operator_image == 'true' && needs.build-operator-image.outputs.operator_image || '') }}
          ALIEN_E2E_NETWORK_MODE: ${{ needs.compute-matrix.outputs.network_mode }}
          ALIEN_TEST_GHCR_USERNAME: ${{ github.actor }}
          ALIEN_TEST_GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -a && source .env.test && set +a
          export ALIEN_TEST_BUN_BINARY="$(command -v bun)"
          "$ALIEN_TEST_BUN_BINARY" --version
          export ALIEN_E2E_RESOURCE_PREFIX="e2e-${ALIEN_E2E_SLOT}-${{ matrix.resource_suffix }}"
          cargo nextest run -p alien-test --test distribution ${{ matrix.test_filter }} ${{ needs.compute-matrix.outputs.test_filter }} --no-capture

  # ── E2E local test matrix ──────────────────────────────────────────
  # Installs alien-operator as an OS service via `alien-deploy up` on each
  # OS (Linux, macOS, Windows), matching the real customer deployment flow.

  local-test:
    needs: [compute-matrix, setup]
    if: |
      !cancelled() && !failure() &&
      needs.compute-matrix.outputs.has_local == 'true'
    # See `push-test` for why this environment is declared.
    environment: e2e-tests
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.compute-matrix.outputs.local_matrix) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Configure git credentials
        run: git config --global url."https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Download .env.test
        uses: actions/download-artifact@v4
        with:
          name: env-test-e2e

      - uses: dtolnay/rust-toolchain@nightly

      # depot cargo works on Linux/macOS; Windows uses sccache directly
      - uses: depot/setup-action@v1
        if: runner.os != 'Windows'

      - uses: docker/setup-qemu-action@v3
        if: runner.os == 'Linux'
        with:
          platforms: arm64

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: taiki-e/install-action@cargo-nextest

      - name: Install protoc (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - uses: oven-sh/setup-bun@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies and build packages
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm -C examples install --frozen-lockfile
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Build alien-operator and alien-deploy (Unix)
        if: runner.os != 'Windows'
        run: depot cargo build -p alien-operator -p alien-deploy-cli

      - name: Build alien-operator and alien-deploy (Windows)
        if: runner.os == 'Windows'
        run: cargo build -p alien-operator -p alien-deploy-cli

      - name: Mask sensitive values from .env.test (Unix)
        if: runner.os != 'Windows'
        run: |
          while IFS= read -r line; do
            [[ "$line" =~ ^#.*$ || -z "$line" ]] && continue
            val="${line#*=}"
            val="${val#\'}" && val="${val%\'}"
            val="${val#\"}" && val="${val%\"}"
            [ -n "$val" ] && echo "::add-mask::$val"
          done < .env.test

      - name: Mask sensitive values from .env.test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-Content .env.test | ForEach-Object {
            if ($_ -match '^([^#][^=]*)=(.*)$') {
              $val = $matches[2]
              if ($val -match "^'(.*)'$" -or $val -match '^"(.*)"$') {
                $val = $matches[1]
              }
              if ($val) { Write-Output "::add-mask::$val" }
            }
          }

      - name: Run E2E local test (Unix)
        if: runner.os != 'Windows'
        env:
          ALIEN_OPERATOR_BINARY: target/debug/alien-operator
          ALIEN_DEPLOY_BINARY: target/debug/alien-deploy
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
          ALIEN_E2E_FOREGROUND: ${{ inputs.foreground_agent && '1' || '' }}
        run: |
          set -a && source .env.test && set +a
          depot cargo nextest run -p alien-test --test pull ${{ matrix.test_filter }} ${{ needs.compute-matrix.outputs.test_filter }} --no-capture

      - name: Run E2E local test (Windows)
        if: runner.os == 'Windows'
        env:
          ALIEN_OPERATOR_BINARY: target/debug/alien-operator.exe
          ALIEN_DEPLOY_BINARY: target/debug/alien-deploy.exe
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
          ALIEN_E2E_FOREGROUND: ${{ inputs.foreground_agent && '1' || '' }}
        shell: pwsh
        run: |
          Get-Content .env.test | ForEach-Object {
            if ($_ -match '^([^#][^=]*)=(.*)$') {
              $key = $matches[1]
              $val = $matches[2]
              # Strip surrounding single or double quotes (shell-style quoting in .env files)
              if ($val -match "^'(.*)'$" -or $val -match '^"(.*)"$') {
                $val = $matches[1]
              }
              [Environment]::SetEnvironmentVariable($key, $val, 'Process')
            }
          }
          cargo nextest run -p alien-test --test pull ${{ matrix.test_filter }} ${{ needs.compute-matrix.outputs.test_filter }} --no-capture

  # ── Cleanup safety net ───────────────────────────────────────────────
  # Runs after all test jobs (even on failure/cancellation) to delete
  # orphaned cloud resources in the dedicated test target accounts.

  cleanup:
    needs: [compute-matrix, setup, push-test, cloudformation-test, terraform-test, local-test]
    if: |
      always() &&
      needs.compute-matrix.outputs.skip_cleanup != 'true' &&
      needs.setup.result == 'success'
    runs-on: depot-ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Download .env.test
        uses: actions/download-artifact@v4
        with:
          name: env-test-e2e

      - name: Clean up AWS resources
        if: always()
        continue-on-error: true
        run: |
          set -a && source .env.test && set +a
          export AWS_ACCESS_KEY_ID="$AWS_TARGET_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$AWS_TARGET_SECRET_ACCESS_KEY"
          export AWS_SESSION_TOKEN="${AWS_TARGET_SESSION_TOKEN:-}"
          export AWS_DEFAULT_REGION="$AWS_TARGET_REGION"
          for suffix in "" "-awscr" "-awsct" "-cfawscr" "-tfawscr" "-tfekscr" "-tfeksfs" "-awsr" "-awst" "-cfaws" "-tfaws" "-tfeks"; do
            export ALIEN_E2E_RESOURCE_PREFIX="e2e-${ALIEN_E2E_SLOT}${suffix}"
            ./scripts/cleanup-aws-e2e-resources.sh
          done

      - uses: google-github-actions/setup-gcloud@v2

      - name: Clean up GCP resources
        if: always()
        continue-on-error: true
        run: |
          set -a && source .env.test && set +a
          key_file="$(mktemp)"
          policy_file="$(mktemp)"
          clean_policy_file="$(mktemp)"
          trap 'rm -f "$key_file" "$policy_file" "$clean_policy_file"' EXIT

          printf '%s' "$GOOGLE_TARGET_SERVICE_ACCOUNT_KEY" > "$key_file"
          gcloud auth activate-service-account --key-file="$key_file" --quiet
          gcloud config set project "$GOOGLE_TARGET_PROJECT_ID" --quiet

          cleanup_deleted_service_account_bindings() {
            gcloud projects get-iam-policy "$GOOGLE_TARGET_PROJECT_ID" --format=json > "$policy_file"
            jq '
              .bindings |= [
                .[]
                | .members = ([.members[]? | select(startswith("deleted:serviceAccount:") | not)])
                | select((.members | length) > 0)
              ]
            ' "$policy_file" > "$clean_policy_file"
            if ! cmp -s "$policy_file" "$clean_policy_file"; then
              echo "Removing IAM bindings for deleted service accounts..."
              gcloud projects set-iam-policy "$GOOGLE_TARGET_PROJECT_ID" "$clean_policy_file" >/dev/null
            fi
          }

          e2e_resource_prefixes=()
          e2e_role_prefixes=()
          for suffix in "" "-gcpcr" "-gcpct" "-tfgcpcr" "-tfgkecr" "-tfgkefs"; do
            resource_prefix="e2e-${ALIEN_E2E_SLOT}${suffix}"
            e2e_resource_prefixes+=("$resource_prefix")
            role_prefix="role_${resource_prefix//-/_}_"
            e2e_role_prefixes+=("$role_prefix")
          done

          matches_e2e_resource_name() {
            local name="$1"
            local prefix
            for prefix in "${e2e_resource_prefixes[@]}"; do
              case "$name" in
                "$prefix"|"$prefix"-*) return 0 ;;
              esac
            done
            return 1
          }

          list_slot_custom_roles() {
            gcloud iam roles list --project="$GOOGLE_TARGET_PROJECT_ID" --format='value(name)' \
              | sed 's|.*/roles/||' \
              | while IFS= read -r role_id; do
                  for role_prefix in "${e2e_role_prefixes[@]}"; do
                    case "$role_id" in
                      "$role_prefix"*) echo "$role_id"; break ;;
                    esac
                  done
                done
          }

          cleanup_slot_custom_roles() {
            mapfile -t role_ids < <(list_slot_custom_roles)
            if [ "${#role_ids[@]}" -eq 0 ]; then
              return 0
            fi

            printf 'Deleting slot-scoped custom IAM roles:\n'
            printf '  %s\n' "${role_ids[@]}"

            gcloud projects get-iam-policy "$GOOGLE_TARGET_PROJECT_ID" --format=json > "$policy_file"
            jq --arg project "$GOOGLE_TARGET_PROJECT_ID" '
              ($ARGS.positional | map("projects/" + $project + "/roles/" + .)) as $roles
              | .bindings |= [.[] | select((.role as $role | $roles | index($role)) | not)]
            ' "$policy_file" --args "${role_ids[@]}" > "$clean_policy_file"
            if ! cmp -s "$policy_file" "$clean_policy_file"; then
              echo "Removing IAM bindings for slot-scoped custom roles..."
              gcloud projects set-iam-policy "$GOOGLE_TARGET_PROJECT_ID" "$clean_policy_file" >/dev/null
            fi

            for role_id in "${role_ids[@]}"; do
              gcloud iam roles delete "$role_id" --project="$GOOGLE_TARGET_PROJECT_ID" --quiet || true
            done
          }

          cleanup_deleted_service_account_bindings

          echo "Deleting Cloud Run services in target project..."
          SERVICES=$(gcloud run services list --platform=managed --region="$GOOGLE_TARGET_REGION" \
            --format='value(name)' 2>/dev/null) || true
          for svc in $SERVICES; do
            if ! matches_e2e_resource_name "$svc"; then
              continue
            fi
            echo "Deleting Cloud Run service: $svc"
            gcloud run services delete "$svc" --platform=managed --region="$GOOGLE_TARGET_REGION" --quiet || true
          done

          echo "Deleting orphaned Cloud Functions in target project..."
          FUNCTIONS=$(gcloud functions list --regions="$GOOGLE_TARGET_REGION" \
            --format='value(name)' 2>/dev/null) || true
          for fn in $FUNCTIONS; do
            if ! matches_e2e_resource_name "$fn"; then
              continue
            fi
            echo "Deleting Cloud Function: $fn"
            gcloud functions delete "$fn" --region="$GOOGLE_TARGET_REGION" --quiet || true
          done

          echo "Deleting slot-scoped Pub/Sub topics..."
          TOPICS=$(gcloud pubsub topics list --format='value(name)' 2>/dev/null) || true
          for topic in $TOPICS; do
            topic_name="${topic##*/}"
            if ! matches_e2e_resource_name "$topic_name"; then
              continue
            fi
            echo "Deleting Pub/Sub topic: $topic"
            gcloud pubsub topics delete "$topic" --quiet || true
          done

          echo "Deleting slot-scoped Secret Manager secrets..."
          SECRETS=$(gcloud secrets list --format='value(name)' 2>/dev/null) || true
          for secret in $SECRETS; do
            secret_name="${secret##*/}"
            if ! matches_e2e_resource_name "$secret_name"; then
              continue
            fi
            echo "Deleting secret: $secret"
            gcloud secrets delete "$secret" --quiet || true
          done

          echo "Deleting slot-scoped Firestore databases..."
          DATABASES=$(gcloud firestore databases list --project="$GOOGLE_TARGET_PROJECT_ID" \
            --format='value(name)' 2>/dev/null) || true
          for database in $DATABASES; do
            database_id="${database##*/}"
            if ! matches_e2e_resource_name "$database_id"; then
              continue
            fi
            echo "Deleting Firestore database: $database_id"
            gcloud firestore databases delete --database="$database_id" \
              --project="$GOOGLE_TARGET_PROJECT_ID" --quiet || true
          done

          echo "Deleting slot-scoped Artifact Registry repositories..."
          REPOSITORIES=$(gcloud artifacts repositories list --location="$GOOGLE_TARGET_REGION" \
            --format='value(name)' 2>/dev/null) || true
          for repository in $REPOSITORIES; do
            repository_name="${repository##*/}"
            if ! matches_e2e_resource_name "$repository_name"; then
              continue
            fi
            echo "Deleting Artifact Registry repository: $repository_name"
            gcloud artifacts repositories delete "$repository_name" \
              --location="$GOOGLE_TARGET_REGION" --quiet || true
          done

          echo "Deleting slot-scoped GCS buckets..."
          BUCKETS=$(gcloud storage buckets list --format='value(name)' 2>/dev/null) || true
          for bucket in $BUCKETS; do
            bucket_name="${bucket#gs://}"
            if ! matches_e2e_resource_name "$bucket_name"; then
              continue
            fi
            echo "Deleting GCS bucket: $bucket_name"
            gcloud storage rm -r "gs://$bucket_name" --quiet || true
          done

          should_delete_e2e_service_account() {
            local sa="$1"
            local local_part="${sa%@*}"
            local domain="${sa#*@}"

            if [ "$domain" != "${GOOGLE_TARGET_PROJECT_ID}.iam.gserviceaccount.com" ]; then
              return 1
            fi

            case "$local_part" in
              alien-test-target|alien-terraform-bootstrap|iam-condition-test|test-custom-sa|horizon-cloud-tests)
                return 1
                ;;
            esac

            matches_e2e_resource_name "$local_part" \
              || [[ "$local_part" =~ ^[a-z0-9]{8}-(management|execution-sa|build-execution-sa)$ ]]
          }

          echo "Deleting orphaned generated E2E service accounts..."
          SAS=$(gcloud iam service-accounts list --format='value(email)' 2>/dev/null) || true
          for sa in $SAS; do
            if should_delete_e2e_service_account "$sa"; then
              echo "Deleting service account: $sa"
              gcloud iam service-accounts delete "$sa" --quiet || true
            else
              echo "Preserving service account: $sa"
            fi
          done

          cleanup_deleted_service_account_bindings
          cleanup_slot_custom_roles

      - name: Clean up Azure resources
        if: always()
        continue-on-error: true
        run: |
          set -u
          set -a && source .env.test && set +a
          az login --service-principal \
            -u "$AZURE_TARGET_CLIENT_ID" -p "$AZURE_TARGET_CLIENT_SECRET" --tenant "$AZURE_TARGET_TENANT_ID" \
            --output none || true
          az account set --subscription "$AZURE_TARGET_SUBSCRIPTION_ID" || true

          echo "Deleting E2E resource groups in target subscription..."
          MATCHED_GROUPS=()
          while IFS= read -r rg; do
            [ -n "$rg" ] || continue
            case "$rg" in
              alien-e2e-shared-*)
                continue
                ;;
            esac
            if [[ ! "$rg" =~ ^[a-z][0-9a-f]{7}-default-resource-group$ ]] \
              && [[ ! "$rg" =~ ^alien-e2e-[0-9a-f]{8}$ ]] \
              && [[ ! "$rg" =~ ^e2e-[0-9]{2}(-[a-z0-9]+)?- ]]; then
              continue
            fi
            MATCHED_GROUPS+=("$rg")
            echo "Deleting resource group: $rg"
            az group delete --subscription "$AZURE_TARGET_SUBSCRIPTION_ID" --name "$rg" --yes --no-wait || true
          done < <(az group list \
            --subscription "$AZURE_TARGET_SUBSCRIPTION_ID" \
            --query "[].name" \
            -o tsv 2>/dev/null || true)

          if [ "${#MATCHED_GROUPS[@]}" -eq 0 ]; then
            echo "No matching Azure E2E resource groups found."
          fi

          for rg in "${MATCHED_GROUPS[@]}"; do
            echo "Waiting for resource group deletion: $rg"
            az group wait \
              --subscription "$AZURE_TARGET_SUBSCRIPTION_ID" \
              --name "$rg" \
              --deleted \
              --timeout 1800 || true
          done

          echo "Purging soft-deleted E2E Key Vaults..."
          DELETED_VAULTS=$(timeout 60 az keyvault list-deleted \
            --subscription "$AZURE_TARGET_SUBSCRIPTION_ID" \
            --query "[].[name,properties.location]" \
            -o tsv 2>/dev/null || true)
          while IFS=$'\t' read -r vault_name vault_location; do
            [ -n "$vault_name" ] || continue
            if [[ ! "$vault_name" =~ ^[a-z][0-9a-f]{7}- ]] \
              && [[ ! "$vault_name" =~ ^alien-e2e-[0-9a-f]{8} ]] \
              && [[ ! "$vault_name" =~ ^e2e-[0-9]{2}(-[a-z0-9]+)?- ]]; then
              continue
            fi
            echo "Purging soft-deleted Key Vault: $vault_name"
            timeout 60 az keyvault purge \
              --subscription "$AZURE_TARGET_SUBSCRIPTION_ID" \
              --name "$vault_name" \
              --location "$vault_location" || true
          done <<< "$DELETED_VAULTS"

          echo "Deleting E2E subscription-scope management role assignments..."
          SUBSCRIPTION_SCOPE="/subscriptions/$AZURE_TARGET_SUBSCRIPTION_ID"
          while IFS=$'\t' read -r assignment_id assignment_description; do
            [ -n "$assignment_id" ] || continue
            [ -n "${assignment_description:-}" ] || continue
            if [[ "$assignment_description" =~ ^management\ uami\ .*\((e2e-[0-9]{2}(-[a-z0-9]+)?|alien-e2e-[0-9a-f]{8}|[a-z][0-9a-f]{7})\)$ ]]; then
              echo "Deleting role assignment: $assignment_id ($assignment_description)"
              az role assignment delete --ids "$assignment_id" || true
            fi
          done < <(az role assignment list \
            --scope "$SUBSCRIPTION_SCOPE" \
            --query "[?description!=null].[id,description]" \
            -o tsv 2>/dev/null || true)
