name: E2E Cloud

on:
  workflow_dispatch:
  merge_group:
  pull_request:
    types: [opened, reopened, synchronize, labeled]

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  # ── Build alien-runtime for both architectures ──────────────────────
  # These run in parallel with the setup job so they don't add latency.

  build-runtime-x86_64:
    if: |
      github.event_name != 'pull_request' || (
        !github.event.pull_request.head.repo.fork && (
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'merge_group' ||
          contains(join(github.event.pull_request.labels.*.name, ','), 'run-cloud-e2e')
        )
      )
    runs-on: depot-ubuntu-24.04-16
    timeout-minutes: 45
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-rust
        with:
          depot-project-id: ${{ vars.DEPOT_PROJECT_ID }}
          repo-access-token: ${{ secrets.REPO_ACCESS_TOKEN }}
          targets: x86_64-unknown-linux-musl
          install-protoc: "true"

      - name: Build alien-runtime (x86_64)
        run: depot cargo build --release -p alien-runtime --target x86_64-unknown-linux-musl

      - uses: actions/upload-artifact@v4
        with:
          name: alien-runtime-x86_64
          path: target/x86_64-unknown-linux-musl/release/alien-runtime
          retention-days: 1

  build-runtime-aarch64:
    if: |
      github.event_name != 'pull_request' || (
        !github.event.pull_request.head.repo.fork && (
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'merge_group' ||
          contains(join(github.event.pull_request.labels.*.name, ','), 'run-cloud-e2e')
        )
      )
    runs-on: depot-ubuntu-24.04-arm-16
    timeout-minutes: 45
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-rust
        with:
          depot-project-id: ${{ vars.DEPOT_PROJECT_ID }}
          repo-access-token: ${{ secrets.REPO_ACCESS_TOKEN }}
          targets: aarch64-unknown-linux-musl
          install-protoc: "true"

      - name: Build alien-runtime (aarch64)
        run: depot cargo build --release -p alien-runtime --target aarch64-unknown-linux-musl

      - uses: actions/upload-artifact@v4
        with:
          name: alien-runtime-aarch64
          path: target/aarch64-unknown-linux-musl/release/alien-runtime
          retention-days: 1

  # ── Build alien-agent for both architectures ───────────────────────
  # Parallel to runtime builds. The agent binary is needed for pull tests.

  build-agent-x86_64:
    if: |
      github.event_name != 'pull_request' || (
        !github.event.pull_request.head.repo.fork && (
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'merge_group' ||
          contains(join(github.event.pull_request.labels.*.name, ','), 'run-cloud-e2e')
        )
      )
    runs-on: depot-ubuntu-24.04-16
    timeout-minutes: 45
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-rust
        with:
          depot-project-id: ${{ vars.DEPOT_PROJECT_ID }}
          repo-access-token: ${{ secrets.REPO_ACCESS_TOKEN }}
          targets: x86_64-unknown-linux-musl
          install-protoc: "true"

      - name: Build alien-agent (x86_64)
        run: depot cargo build --release -p alien-agent --target x86_64-unknown-linux-musl

      - uses: actions/upload-artifact@v4
        with:
          name: alien-agent-x86_64
          path: target/x86_64-unknown-linux-musl/release/alien-agent
          retention-days: 1

  build-agent-aarch64:
    if: |
      github.event_name != 'pull_request' || (
        !github.event.pull_request.head.repo.fork && (
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'merge_group' ||
          contains(join(github.event.pull_request.labels.*.name, ','), 'run-cloud-e2e')
        )
      )
    runs-on: depot-ubuntu-24.04-arm-16
    timeout-minutes: 45
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-rust
        with:
          depot-project-id: ${{ vars.DEPOT_PROJECT_ID }}
          repo-access-token: ${{ secrets.REPO_ACCESS_TOKEN }}
          targets: aarch64-unknown-linux-musl
          install-protoc: "true"

      - name: Build alien-agent (aarch64)
        run: depot cargo build --release -p alien-agent --target aarch64-unknown-linux-musl

      - uses: actions/upload-artifact@v4
        with:
          name: alien-agent-aarch64
          path: target/aarch64-unknown-linux-musl/release/alien-agent
          retention-days: 1

  # ── Build container images ─────────────────────────────────────────

  build-base-image:
    needs: [build-runtime-x86_64, build-runtime-aarch64]
    runs-on: depot-ubuntu-24.04-arm
    timeout-minutes: 15
    outputs:
      base_image: ghcr.io/alienplatform/alien-base:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: alien-runtime-x86_64
          path: target/x86_64-unknown-linux-musl/release/

      - uses: actions/download-artifact@v4
        with:
          name: alien-runtime-aarch64
          path: target/aarch64-unknown-linux-musl/release/

      - name: Make binaries executable
        run: chmod +x target/*/release/alien-runtime

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: depot/setup-action@v1

      - name: Build and push alien-base
        uses: depot/build-push-action@v1
        with:
          project: ${{ vars.DEPOT_PROJECT_ID }}
          context: .
          file: docker/Dockerfile.alien-base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/alienplatform/alien-base:${{ github.sha }}
          provenance: false

  build-agent-image:
    needs: [build-agent-x86_64, build-agent-aarch64]
    runs-on: depot-ubuntu-24.04-arm
    timeout-minutes: 15
    outputs:
      agent_image: ghcr.io/alienplatform/alien-agent:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: alien-agent-x86_64
          path: target/x86_64-unknown-linux-musl/release/

      - uses: actions/download-artifact@v4
        with:
          name: alien-agent-aarch64
          path: target/aarch64-unknown-linux-musl/release/

      - name: Make binaries executable
        run: chmod +x target/*/release/alien-agent

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: depot/setup-action@v1

      - name: Build and push alien-agent
        uses: depot/build-push-action@v1
        with:
          project: ${{ vars.DEPOT_PROJECT_ID }}
          context: .
          file: docker/Dockerfile.alien-agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/alienplatform/alien-agent:${{ github.sha }}
          provenance: false

  # ── Terraform setup ─────────────────────────────────────────────────

  setup:
    # Skip on fork PRs (no access to secrets)
    if: |
      github.event_name != 'pull_request' || (
        !github.event.pull_request.head.repo.fork && (
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'merge_group' ||
          contains(join(github.event.pull_request.labels.*.name, ','), 'run-cloud-e2e')
        )
      )
    # Prevent concurrent terraform applies on the same workspace
    concurrency:
      group: terraform-test-infra
      cancel-in-progress: false
    runs-on: depot-ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/standalone
        run: terraform init
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform apply
        working-directory: infra/standalone
        run: terraform apply -auto-approve
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_aws_management_access_key_id: ${{ secrets.TEST_AWS_MGMT_ACCESS_KEY_ID }}
          TF_VAR_aws_management_secret_access_key: ${{ secrets.TEST_AWS_MGMT_SECRET_ACCESS_KEY }}
          TF_VAR_aws_target_access_key_id: ${{ secrets.TEST_AWS_TARGET_ACCESS_KEY_ID }}
          TF_VAR_aws_target_secret_access_key: ${{ secrets.TEST_AWS_TARGET_SECRET_ACCESS_KEY }}
          TF_VAR_google_management_service_account_key: ${{ secrets.TEST_GCP_MGMT_SA_KEY }}
          TF_VAR_google_management_project_id: ${{ vars.TEST_GCP_MGMT_PROJECT_ID }}
          TF_VAR_google_target_service_account_key: ${{ secrets.TEST_GCP_TARGET_SA_KEY }}
          TF_VAR_google_target_project_id: ${{ vars.TEST_GCP_TARGET_PROJECT_ID }}
          TF_VAR_azure_management_subscription_id: ${{ secrets.TEST_AZURE_MGMT_SUBSCRIPTION_ID }}
          TF_VAR_azure_management_tenant_id: ${{ secrets.TEST_AZURE_MGMT_TENANT_ID }}
          TF_VAR_azure_management_client_id: ${{ secrets.TEST_AZURE_MGMT_CLIENT_ID }}
          TF_VAR_azure_management_client_secret: ${{ secrets.TEST_AZURE_MGMT_CLIENT_SECRET }}
          TF_VAR_azure_target_subscription_id: ${{ secrets.TEST_AZURE_TARGET_SUBSCRIPTION_ID }}
          TF_VAR_azure_target_tenant_id: ${{ secrets.TEST_AZURE_TARGET_TENANT_ID }}
          TF_VAR_azure_target_client_id: ${{ secrets.TEST_AZURE_TARGET_CLIENT_ID }}
          TF_VAR_azure_target_client_secret: ${{ secrets.TEST_AZURE_TARGET_CLIENT_SECRET }}

      - name: Set up Azure OIDC token
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SUBJECT="repo:${{ github.repository }}:pull_request"
          else
            SUBJECT="repo:${{ github.repository }}:ref:${{ github.ref }}"
          fi
          echo "Setting AZURE_MANAGEMENT_OIDC_SUBJECT=$SUBJECT"
          echo "AZURE_MANAGEMENT_OIDC_SUBJECT=$SUBJECT" >> $GITHUB_ENV
          echo "AZURE_MANAGEMENT_OIDC_ISSUER=https://token.actions.githubusercontent.com" >> $GITHUB_ENV

      - name: Generate .env.test
        run: |
          ./scripts/gen-env-test.sh
          echo "--- verifying .env.test exists ---"
          ls -la .env.test
          wc -l .env.test
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          AXIOM_TOKEN: ${{ secrets.AXIOM_CI_API_KEY }}

      - name: Upload .env.test artifact
        uses: actions/upload-artifact@v4
        with:
          name: env-test-e2e
          path: .env.test
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

  # ── E2E push test matrix ───────────────────────────────────────────

  push-test:
    needs: [setup, build-base-image]
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'merge_group' ||
      (github.event_name == 'pull_request' &&
        !github.event.pull_request.head.repo.fork &&
        contains(join(github.event.pull_request.labels.*.name, ','), 'run-cloud-e2e'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: push-aws-rust
            test_filter: push_aws_rust
            needs_oidc: false
          - name: push-aws-typescript
            test_filter: push_aws_typescript
            needs_oidc: false
          - name: push-gcp-rust
            test_filter: push_gcp_rust
            needs_oidc: false
          - name: push-gcp-typescript
            test_filter: push_gcp_typescript
            needs_oidc: false
          - name: push-azure-rust
            test_filter: push_azure_rust
            needs_oidc: true
          - name: push-azure-typescript
            test_filter: push_azure_typescript
            needs_oidc: true
    runs-on: depot-ubuntu-24.04-arm-8
    timeout-minutes: 60
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Configure git credentials
        run: git config --global url."https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Download .env.test
        uses: actions/download-artifact@v4
        with:
          name: env-test-e2e

      - name: Acquire Azure OIDC token
        if: matrix.needs_oidc
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" | jq -r .value)
          echo "$TOKEN" > /tmp/azure-oidc-token
          echo "AZURE_FEDERATED_TOKEN_FILE=/tmp/azure-oidc-token" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@nightly

      - uses: depot/setup-action@v1

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: taiki-e/install-action@cargo-nextest

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - uses: mlugg/setup-zig@v2

      - uses: oven-sh/setup-bun@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies and build packages
        run: pnpm install --frozen-lockfile && pnpm build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Run E2E push test
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
          ALIEN_TEST_OVERRIDE_BASE_IMAGE: ${{ needs.build-base-image.outputs.base_image }}
        run: |
          set -a && source .env.test && set +a
          depot cargo nextest run -p alien-test --test push ${{ matrix.test_filter }} --no-capture

  # ── E2E pull test matrix ───────────────────────────────────────────

  pull-test:
    needs: [setup, build-base-image, build-agent-image]
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'merge_group' ||
      (github.event_name == 'pull_request' &&
        !github.event.pull_request.head.repo.fork &&
        contains(join(github.event.pull_request.labels.*.name, ','), 'run-cloud-e2e'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: pull-aws-rust
            test_filter: pull_aws_rust
          - name: pull-aws-typescript
            test_filter: pull_aws_typescript
          - name: pull-gcp-rust
            test_filter: pull_gcp_rust
          - name: pull-gcp-typescript
            test_filter: pull_gcp_typescript
    runs-on: depot-ubuntu-24.04-arm-8
    timeout-minutes: 60
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Configure git credentials
        run: git config --global url."https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Download .env.test
        uses: actions/download-artifact@v4
        with:
          name: env-test-e2e

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull agent image
        run: docker pull ${{ needs.build-agent-image.outputs.agent_image }}

      - uses: dtolnay/rust-toolchain@nightly

      - uses: depot/setup-action@v1

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: taiki-e/install-action@cargo-nextest

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - uses: mlugg/setup-zig@v2

      - uses: oven-sh/setup-bun@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies and build packages
        run: pnpm install --frozen-lockfile && pnpm build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Run E2E pull test
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
          ALIEN_TEST_OVERRIDE_BASE_IMAGE: ${{ needs.build-base-image.outputs.base_image }}
          ALIEN_TEST_OVERRIDE_AGENT_IMAGE: ${{ needs.build-agent-image.outputs.agent_image }}
        run: |
          set -a && source .env.test && set +a
          depot cargo nextest run -p alien-test --test pull ${{ matrix.test_filter }} --no-capture

  # ── Cleanup safety net ───────────────────────────────────────────────
  # Runs after all test jobs (even on failure/cancellation) to delete
  # orphaned cloud resources in the dedicated test target accounts.

  cleanup:
    needs: [push-test, pull-test]
    if: always()
    runs-on: depot-ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - name: Clean up AWS resources
        if: always()
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TEST_AWS_TARGET_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TEST_AWS_TARGET_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-2
        run: |
          echo "Deleting CloudFormation stacks in target account..."
          STACKS=$(aws cloudformation list-stacks \
            --stack-status-filter CREATE_COMPLETE UPDATE_COMPLETE ROLLBACK_COMPLETE \
                                  CREATE_FAILED UPDATE_FAILED DELETE_FAILED \
            --query 'StackSummaries[].StackName' --output text) || true
          for stack in $STACKS; do
            echo "Deleting stack: $stack"
            aws cloudformation delete-stack --stack-name "$stack" || true
          done

          echo "Waiting for stack deletions to complete..."
          for stack in $STACKS; do
            aws cloudformation wait stack-delete-complete --stack-name "$stack" 2>/dev/null || true
          done

          echo "Deleting all Lambda functions in target account..."
          LAMBDAS=$(aws lambda list-functions --query 'Functions[].FunctionName' --output text) || true
          for fn in $LAMBDAS; do
            echo "Deleting Lambda function: $fn"
            aws lambda delete-function --function-name "$fn" || true
          done

          echo "Deleting all SQS queues in target account..."
          QUEUES=$(aws sqs list-queues --query 'QueueUrls[]' --output text 2>/dev/null) || true
          for queue in $QUEUES; do
            echo "Deleting SQS queue: $queue"
            aws sqs delete-queue --queue-url "$queue" || true
          done

          echo "Deleting all DynamoDB tables in target account..."
          TABLES=$(aws dynamodb list-tables --query 'TableNames[]' --output text) || true
          for table in $TABLES; do
            echo "Deleting DynamoDB table: $table"
            aws dynamodb delete-table --table-name "$table" || true
          done

          echo "Deleting all SSM parameters in target account..."
          PARAMS=$(aws ssm describe-parameters --query 'Parameters[].Name' --output text) || true
          for param in $PARAMS; do
            echo "Deleting SSM parameter: $param"
            aws ssm delete-parameter --name "$param" || true
          done

          echo "Deleting all S3 buckets in target account..."
          BUCKETS=$(aws s3api list-buckets --query 'Buckets[].Name' --output text) || true
          for bucket in $BUCKETS; do
            echo "Emptying and deleting S3 bucket: $bucket"
            aws s3 rm "s3://$bucket" --recursive || true
            aws s3api delete-bucket --bucket "$bucket" || true
          done

          echo "Deleting all CodeBuild projects in target account..."
          PROJECTS=$(aws codebuild list-projects --query 'projects[]' --output text) || true
          for project in $PROJECTS; do
            echo "Deleting CodeBuild project: $project"
            aws codebuild delete-project --name "$project" || true
          done

          echo "Deleting orphaned IAM roles in target account..."
          # Delete roles that match the test hex prefix pattern (8 chars + dash)
          ROLES=$(aws iam list-roles --query 'Roles[].RoleName' --output text) || true
          for role in $ROLES; do
            # Skip AWS service-linked roles and other system roles
            if echo "$role" | grep -qE '^(aws-|AWSServiceRole|OrganizationAccountAccessRole)'; then
              continue
            fi
            echo "Detaching policies and deleting IAM role: $role"
            POLICIES=$(aws iam list-attached-role-policies --role-name "$role" --query 'AttachedPolicies[].PolicyArn' --output text) || true
            for policy in $POLICIES; do
              aws iam detach-role-policy --role-name "$role" --policy-arn "$policy" || true
            done
            INLINE=$(aws iam list-role-policies --role-name "$role" --query 'PolicyNames[]' --output text) || true
            for ip in $INLINE; do
              aws iam delete-role-policy --role-name "$role" --policy-name "$ip" || true
            done
            aws iam delete-role --role-name "$role" || true
          done

          echo "Deleting orphaned ECR repositories in target account..."
          REPOS=$(aws ecr describe-repositories --query 'repositories[].repositoryName' --output text 2>/dev/null) || true
          for repo in $REPOS; do
            echo "Deleting ECR repository: $repo"
            aws ecr delete-repository --repository-name "$repo" --force || true
          done

      - name: Clean up GCP resources
        if: always()
        continue-on-error: true
        env:
          GCP_TARGET_PROJECT_ID: ${{ vars.TEST_GCP_TARGET_PROJECT_ID }}
        run: |
          echo '${{ secrets.TEST_GCP_TARGET_SA_KEY }}' > /tmp/gcp-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json --quiet || true
          gcloud config set project "$GCP_TARGET_PROJECT_ID" --quiet || true

          echo "Deleting Cloud Run services in target project..."
          SERVICES=$(gcloud run services list --platform=managed --region=us-east4 \
            --format='value(name)' 2>/dev/null) || true
          for svc in $SERVICES; do
            echo "Deleting Cloud Run service: $svc"
            gcloud run services delete "$svc" --platform=managed --region=us-east4 --quiet || true
          done

          echo "Deleting orphaned Cloud Functions in target project..."
          FUNCTIONS=$(gcloud functions list --regions=us-east4 \
            --format='value(name)' 2>/dev/null) || true
          for fn in $FUNCTIONS; do
            echo "Deleting Cloud Function: $fn"
            gcloud functions delete "$fn" --region=us-east4 --quiet || true
          done

          echo "Deleting orphaned Pub/Sub topics..."
          TOPICS=$(gcloud pubsub topics list --format='value(name)' 2>/dev/null) || true
          for topic in $TOPICS; do
            echo "Deleting Pub/Sub topic: $topic"
            gcloud pubsub topics delete "$topic" --quiet || true
          done

          echo "Deleting orphaned Pub/Sub subscriptions..."
          SUBS=$(gcloud pubsub subscriptions list --format='value(name)' 2>/dev/null) || true
          for sub in $SUBS; do
            echo "Deleting Pub/Sub subscription: $sub"
            gcloud pubsub subscriptions delete "$sub" --quiet || true
          done

          echo "Deleting orphaned Secret Manager secrets..."
          SECRETS=$(gcloud secrets list --format='value(name)' 2>/dev/null) || true
          for secret in $SECRETS; do
            echo "Deleting secret: $secret"
            gcloud secrets delete "$secret" --quiet || true
          done

          echo "Deleting orphaned GCS buckets..."
          BUCKETS=$(gcloud storage buckets list --format='value(name)' 2>/dev/null) || true
          for bucket in $BUCKETS; do
            echo "Deleting GCS bucket: $bucket"
            gcloud storage rm -r "gs://$bucket" --quiet || true
          done

          echo "Deleting test-generated service accounts..."
          # Test SAs use 8-char hex prefix pattern (e.g. f8a23892-execution-sa@...)
          gcloud iam service-accounts list --format='value(email)' 2>/dev/null | \
            grep -E '^[a-z0-9]{8}-' | while read sa; do
            echo "Deleting service account: $sa"
            gcloud iam service-accounts delete "$sa" --quiet || true
          done

          echo "Cleaning up stale IAM policy bindings (deleted members)..."
          # Deleted SAs leave 'deleted:serviceAccount:...' bindings that accumulate
          # and eventually hit the 1500 member limit
          gcloud projects get-iam-policy "$GCP_TARGET_PROJECT_ID" --format=json > /tmp/iam-policy.json 2>/dev/null || true
          python3 -c "
          import json
          with open('/tmp/iam-policy.json') as f:
              policy = json.load(f)
          removed = 0
          cleaned = []
          for b in policy.get('bindings', []):
              new_members = [m for m in b.get('members', []) if not m.startswith('deleted:')]
              removed += len(b.get('members', [])) - len(new_members)
              if new_members:
                  b['members'] = new_members
                  cleaned.append(b)
          policy['bindings'] = cleaned
          with open('/tmp/iam-policy.json', 'w') as f:
              json.dump(policy, f)
          print(f'Removed {removed} stale IAM policy members')
          " || true
          gcloud projects set-iam-policy "$GCP_TARGET_PROJECT_ID" /tmp/iam-policy.json --quiet 2>/dev/null || true

          echo "Deleting orphaned custom roles..."
          ROLES=$(gcloud iam roles list --project="$GCP_TARGET_PROJECT_ID" --format='value(name)' 2>/dev/null) || true
          for role in $ROLES; do
            # Only delete roles with test stack prefix pattern
            ROLE_ID=$(basename "$role")
            echo "Deleting custom role: $ROLE_ID"
            gcloud iam roles delete "$ROLE_ID" --project="$GCP_TARGET_PROJECT_ID" --quiet 2>/dev/null || true
          done

          rm -f /tmp/gcp-key.json /tmp/iam-policy.json

      - name: Clean up Azure resources
        if: always()
        continue-on-error: true
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.TEST_AZURE_TARGET_SUBSCRIPTION_ID }}
          AZURE_TENANT_ID: ${{ secrets.TEST_AZURE_TARGET_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.TEST_AZURE_TARGET_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.TEST_AZURE_TARGET_CLIENT_SECRET }}
        run: |
          az login --service-principal \
            -u "$AZURE_CLIENT_ID" -p "$AZURE_CLIENT_SECRET" --tenant "$AZURE_TENANT_ID" \
            --output none || true
          az account set --subscription "$AZURE_SUBSCRIPTION_ID" || true

          echo "Deleting resource groups in target subscription..."
          GROUPS=$(az group list --query "[].name" -o tsv 2>/dev/null) || true
          for rg in $GROUPS; do
            echo "Deleting resource group: $rg"
            az group delete --name "$rg" --yes --no-wait || true
          done

          echo "Deleting orphaned custom role definitions..."
          # Test role definitions use deterministic UUIDs from stack prefixes
          ROLES=$(az role definition list --custom-role-only true \
            --query "[?contains(roleName, '(')].{name:name, roleName:roleName}" -o tsv 2>/dev/null) || true
          echo "$ROLES" | while IFS=$'\t' read -r name roleName; do
            [ -z "$name" ] && continue
            echo "Deleting custom role: $roleName ($name)"
            az role definition delete --name "$name" 2>/dev/null || true
          done
