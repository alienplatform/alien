name: Generated Drift

on:
  pull_request:
    paths:
      - 'packages/core/**'
      - 'packages/sdk/**'
      - 'crates/alien-core/**'
      - 'crates/alien-worker-protocol/proto/**'
      - 'client-sdks/platform/openapi.json'
      - 'client-sdks/manager/openapi.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift:
    # Speakeasy does not support GitHub OIDC for CLI authentication. Keep this
    # job gated until the SPEAKEASY_API_KEY secret is configured, then set the
    # GENERATED_DRIFT_ENABLED repository variable to "true".
    #
    # Pull requests from forks cannot access repository secrets, so only run
    # authenticated generation for branches in this repository.
    if: >-
      vars.GENERATED_DRIFT_ENABLED == 'true' &&
      (github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: depot-ubuntu-24.04-arm-4
    timeout-minutes: 60
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@nightly

      - uses: depot/setup-action@v1

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Speakeasy CLI
        # Match the version recorded by both checked-in Speakeasy lock files.
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERSION: "1.680.11"
        run: curl -fsSL https://raw.githubusercontent.com/speakeasy-api/speakeasy/v1.680.11/install.sh | sh

      - name: Regenerate code
        env:
          SPEAKEASY_API_KEY: ${{ secrets.SPEAKEASY_API_KEY }}
        run: |
          pnpm generate
          pnpm generate:platform-api
          pnpm generate:manager-api

      - name: Assert no generated drift
        run: git diff --exit-code
