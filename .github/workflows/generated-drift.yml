name: Generated Drift

on:
  pull_request:
    paths:
      - 'packages/core/**'
      - 'packages/sdk/**'
      - 'crates/alien-core/**'
      - 'client-sdks/platform/openapi.json'
      - 'client-sdks/manager/openapi.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  drift:
    # Gated on a repo variable: flip GENERATED_DRIFT_ENABLED to 'true' once
    # the SPEAKEASY_API_KEY secret is configured. The job itself is ready —
    # the previous hard-disable traced to installing the wrong package (the
    # npm `speakeasy` package is a TOTP library, not the Speakeasy CLI).
    if: vars.GENERATED_DRIFT_ENABLED == 'true'
    runs-on: depot-ubuntu-24.04-arm-4
    timeout-minutes: 60
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@nightly

      - uses: depot/setup-action@v1

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure git credentials
        run: git config --global url."https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Speakeasy CLI
        # The npm `speakeasy` package is an unrelated TOTP library — the CLI
        # ships through Speakeasy's install script.
        run: curl -fsSL https://go.speakeasy.com/cli-install.sh | sh

      - name: Regenerate code
        env:
          SPEAKEASY_API_KEY: ${{ secrets.SPEAKEASY_API_KEY }}
        run: |
          pnpm generate
          pnpm generate:platform-api
          pnpm generate:manager-api

      - name: Assert no generated drift
        run: git diff --exit-code
