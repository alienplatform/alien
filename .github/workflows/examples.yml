name: Examples

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      local_needed: ${{ steps.filter.outputs.local_needed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect local-override relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            local_needed:
              - 'examples/**'
              - 'packages/core/**'
              - 'packages/bindings/**'
              - 'packages/testing/**'
              - 'packages/commands-client/**'
              - 'client-sdks/platform/typescript/**'
              - 'crates/alien-cli/**'
              - 'crates/alien-core/**'
              - 'crates/alien-bindings/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'examples/package.json'
              - 'examples/pnpm-workspace.yaml'
              - 'scripts/test-examples-local.sh'

  examples-published:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            examples/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Run examples (primary mode with local fallback)
        run: pnpm test:examples

  examples-local:
    needs: changes
    if: needs.changes.outputs.local_needed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            examples/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Run examples (forced local override mode)
        run: pnpm test:examples:local
