name: Examples

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  examples-published:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            examples/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Run examples (primary mode with local fallback)
        run: pnpm test:examples

  examples-local:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Only run local-override tests on PRs that touch relevant paths
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            examples/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Run examples (forced local override mode)
        run: pnpm test:examples:local
