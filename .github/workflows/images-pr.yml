name: Images PR Build

on:
  pull_request:
    paths:
      - 'docker/**'
      - 'crates/alien-runtime/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/images*.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Install zig
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Add musl targets
        run: |
          rustup target add aarch64-unknown-linux-musl
          rustup target add x86_64-unknown-linux-musl

      - name: Build alien-runtime binaries
        run: |
          cargo zigbuild -p alien-runtime --bin alien-runtime \
            --target aarch64-unknown-linux-musl \
            --target x86_64-unknown-linux-musl \
            --release

      - name: Build alien-base (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.alien-base
          platforms: linux/amd64,linux/arm64
          push: false
          provenance: false
          sbom: false

      - name: Build alien-builder (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.alien-builder
          platforms: linux/amd64,linux/arm64
          push: false
          provenance: false
          sbom: false
