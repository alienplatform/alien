name: Images PR Build

on:
  pull_request:
    paths:
      - 'docker/**'
      - 'crates/alien-runtime/**'
      - 'crates/alien-agent/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/images-pr.yml'
      - '.github/workflows/release.yml'

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: depot-ubuntu-24.04-arm-16
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Setup Depot
        uses: depot/setup-action@v1

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure git credentials for cargo
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com" > ~/.git-credentials

      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: depot cargo install cargo-zigbuild --locked

      - name: Add musl targets
        run: |
          rustup target add aarch64-unknown-linux-musl
          rustup target add x86_64-unknown-linux-musl

      - name: Build binaries
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          depot cargo zigbuild -p alien-runtime -p alien-agent --release \
            --target x86_64-unknown-linux-musl \
            --target aarch64-unknown-linux-musl

      - name: Build alien-base (no push)
        uses: depot/build-push-action@v1
        with:
          project: ${{ vars.DEPOT_PROJECT_ID }}
          context: .
          file: docker/Dockerfile.alien-base
          platforms: linux/amd64,linux/arm64
          push: false
          provenance: false
          sbom: false

      - name: Build alien-builder (no push)
        uses: depot/build-push-action@v1
        with:
          project: ${{ vars.DEPOT_PROJECT_ID }}
          context: .
          file: docker/Dockerfile.alien-builder
          platforms: linux/amd64,linux/arm64
          push: false
          provenance: false
          sbom: false

      - name: Build alien-agent (no push)
        uses: depot/build-push-action@v1
        with:
          project: ${{ vars.DEPOT_PROJECT_ID }}
          context: .
          file: docker/Dockerfile.alien-agent
          platforms: linux/amd64,linux/arm64
          push: false
          provenance: false
          sbom: false
