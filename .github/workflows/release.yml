name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print the computed version without publishing'
        type: boolean
        default: false

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  prepare:
    runs-on: depot-ubuntu-24.04-arm
    timeout-minutes: 10
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          fetch-depth: 0

      - name: Compute next version
        id: bump
        run: |
          LATEST_TAG=$(git describe --tags --match "v[0-9]*" --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT_VERSION=${LATEST_TAG#v}
          echo "Latest tag: $LATEST_TAG"

          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s%n%b")

          if echo "$COMMITS" | grep -qE "(BREAKING[- ]CHANGE|^[a-z]+(\([^)]+\))?!:)"; then
            BUMP=major
          elif echo "$COMMITS" | grep -qE "^feat(\([^)]+\))?:"; then
            BUMP=minor
          else
            BUMP=patch
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          case "$BUMP" in
            major) VERSION="$((MAJOR + 1)).0.0" ;;
            minor) VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          echo "Bump type: $BUMP"
          echo "New version: v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set workspace Cargo version
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          python3 - <<EOF
          import re, os
          v = os.environ['VERSION']
          with open('Cargo.toml', 'r') as f:
              content = f.read()
          content = re.sub(r'(\[workspace\.package\]\nversion = )"[^"]+"', rf'\1"{v}"', content)
          content = re.sub(r'(path = "[^"]+", version = )"[^"]+"', rf'\1"{v}"', content)
          with open('Cargo.toml', 'w') as f:
              f.write(content)
          EOF
        env:
          VERSION: ${{ steps.bump.outputs.version }}

      - name: Set npm package versions
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          for pkg in packages/core packages/bindings packages/testing packages/commands-client; do
            node -e "
              const fs = require('fs');
              const p = fs.readFileSync('${pkg}/package.json', 'utf8');
              const j = JSON.parse(p);
              j.version = process.env.VERSION;
              fs.writeFileSync('${pkg}/package.json', JSON.stringify(j, null, 2) + '\n');
            " VERSION="$VERSION"
          done

      - name: Commit and tag
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml packages/core/package.json packages/bindings/package.json packages/testing/package.json packages/commands-client/package.json
          git commit -m "chore: release v${VERSION}"
          git tag "v${VERSION}"
          git push
          git push --tags

  # ─── Registry publishing (crates.io + npm) ──────────────────────────

  publish-crates:
    needs: prepare
    if: ${{ !inputs.dry_run }}
    runs-on: depot-ubuntu-24.04-arm-4
    timeout-minutes: 60
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Configure git credentials for cargo
        run: |
          git config --global url."https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Depot
        uses: depot/setup-action@v1

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Publish crates
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          for crate in \
            alien-error-derive \
            alien-macros \
            alien-error \
            alien-core \
            alien-client-core \
            alien-aws-clients \
            alien-gcp-clients \
            alien-azure-clients \
            alien-k8s-clients \
            alien-platform-api \
            alien-manager-api \
            alien-client-config \
            alien-permissions \
            alien-bindings \
            alien-commands; do
            echo "Publishing $crate..."
            depot cargo publish -p "$crate" --no-verify
            sleep 20
          done

  publish-npm:
    needs: prepare
    if: ${{ !inputs.dry_run }}
    runs-on: depot-ubuntu-24.04-arm-4
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm --filter @alienplatform/core publish --access public --no-git-checks
          pnpm --filter @alienplatform/bindings publish --access public --no-git-checks
          pnpm --filter @alienplatform/testing publish --access public --no-git-checks
          pnpm --filter @alienplatform/commands-client publish --access public --no-git-checks

  # ─── Binary builds (Linux + macOS, cached) ──────────────────────────

  build-binaries-linux:
    needs: prepare
    if: ${{ !inputs.dry_run }}
    runs-on: depot-ubuntu-24.04-arm-16
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Restore binaries from cache
        id: binary-cache
        uses: actions/cache@v4
        with:
          path: |
            target/x86_64-unknown-linux-musl/release/alien
            target/x86_64-unknown-linux-musl/release/alien-deploy
            target/x86_64-unknown-linux-musl/release/alien-agent
            target/x86_64-unknown-linux-musl/release/alien-runtime
            target/aarch64-unknown-linux-musl/release/alien
            target/aarch64-unknown-linux-musl/release/alien-deploy
            target/aarch64-unknown-linux-musl/release/alien-agent
            target/aarch64-unknown-linux-musl/release/alien-runtime
          key: release-linux-${{ hashFiles('Cargo.toml', 'Cargo.lock') }}-v${{ needs.prepare.outputs.version }}

      - uses: dtolnay/rust-toolchain@nightly
        if: steps.binary-cache.outputs.cache-hit != 'true'

      - name: Configure git credentials for cargo
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: |
          git config --global url."https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Depot
        if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: depot/setup-action@v1

      - name: Run sccache-cache
        if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install protoc
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: sudo apt-get install -y protobuf-compiler

      - name: Install zig
        if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: depot cargo install cargo-zigbuild --locked

      - name: Add musl targets
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: |
          rustup target add x86_64-unknown-linux-musl aarch64-unknown-linux-musl

      - name: Build all binaries (both targets)
        if: steps.binary-cache.outputs.cache-hit != 'true'
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          depot cargo zigbuild --release \
            -p alien-cli -p alien-deploy-cli -p alien-agent -p alien-runtime \
            --target x86_64-unknown-linux-musl \
            --target aarch64-unknown-linux-musl

      - name: Upload x86_64 linux binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-x86_64-unknown-linux-musl
          retention-days: 1
          path: |
            target/x86_64-unknown-linux-musl/release/alien
            target/x86_64-unknown-linux-musl/release/alien-deploy
            target/x86_64-unknown-linux-musl/release/alien-agent
            target/x86_64-unknown-linux-musl/release/alien-runtime

      - name: Upload aarch64 linux binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-aarch64-unknown-linux-musl
          retention-days: 1
          path: |
            target/aarch64-unknown-linux-musl/release/alien
            target/aarch64-unknown-linux-musl/release/alien-deploy
            target/aarch64-unknown-linux-musl/release/alien-agent
            target/aarch64-unknown-linux-musl/release/alien-runtime

  build-binaries-darwin:
    needs: prepare
    if: ${{ !inputs.dry_run }}
    runs-on: depot-macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Restore binaries from cache
        id: binary-cache
        uses: actions/cache@v4
        with:
          path: |
            target/x86_64-apple-darwin/release/alien
            target/x86_64-apple-darwin/release/alien-deploy
            target/x86_64-apple-darwin/release/alien-agent
            target/aarch64-apple-darwin/release/alien
            target/aarch64-apple-darwin/release/alien-deploy
            target/aarch64-apple-darwin/release/alien-agent
          key: release-darwin-${{ hashFiles('Cargo.toml', 'Cargo.lock') }}-v${{ needs.prepare.outputs.version }}

      - uses: dtolnay/rust-toolchain@nightly
        if: steps.binary-cache.outputs.cache-hit != 'true'
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Configure git credentials for cargo
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: |
          git config --global url."https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Depot
        if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: depot/setup-action@v1

      - name: Run sccache-cache
        if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install protoc
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: brew install protobuf

      - name: Build aarch64 darwin binaries
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: |
          cargo build --release \
            -p alien-cli -p alien-deploy-cli -p alien-agent \
            --target aarch64-apple-darwin

      - name: Build x86_64 darwin binaries
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: |
          cargo build --release \
            -p alien-cli -p alien-deploy-cli -p alien-agent \
            --target x86_64-apple-darwin

      - name: Upload x86_64 darwin binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-x86_64-apple-darwin
          retention-days: 1
          path: |
            target/x86_64-apple-darwin/release/alien
            target/x86_64-apple-darwin/release/alien-deploy
            target/x86_64-apple-darwin/release/alien-agent

      - name: Upload aarch64 darwin binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-aarch64-apple-darwin
          retention-days: 1
          path: |
            target/aarch64-apple-darwin/release/alien
            target/aarch64-apple-darwin/release/alien-deploy
            target/aarch64-apple-darwin/release/alien-agent

  build-binaries-windows:
    needs: prepare
    if: ${{ !inputs.dry_run }}
    runs-on: depot-ubuntu-24.04-arm-16
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Restore binaries from cache
        id: binary-cache
        uses: actions/cache@v4
        with:
          path: |
            target/x86_64-pc-windows-gnu/release/alien.exe
            target/x86_64-pc-windows-gnu/release/alien-deploy.exe
          key: release-windows-${{ hashFiles('Cargo.toml', 'Cargo.lock') }}-v${{ needs.prepare.outputs.version }}

      - uses: dtolnay/rust-toolchain@nightly
        if: steps.binary-cache.outputs.cache-hit != 'true'
        with:
          targets: x86_64-pc-windows-gnu

      - name: Configure git credentials for cargo
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: |
          git config --global url."https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Depot
        if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: depot/setup-action@v1

      - name: Run sccache-cache
        if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install protoc
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: sudo apt-get install -y protobuf-compiler

      - name: Install zig
        if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: depot cargo install cargo-zigbuild --locked

      - name: Build windows binaries
        if: steps.binary-cache.outputs.cache-hit != 'true'
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
          RUSTC_WRAPPER: ""
        run: |
          cargo zigbuild --release \
            -p alien-cli -p alien-deploy-cli \
            --target x86_64-pc-windows-gnu

      - name: Upload windows binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-x86_64-pc-windows-gnu
          retention-days: 1
          path: |
            target/x86_64-pc-windows-gnu/release/alien.exe
            target/x86_64-pc-windows-gnu/release/alien-deploy.exe

  # ─── Upload binaries to S3 ──────────────────────────────────────────

  upload-binaries:
    needs: [prepare, build-binaries-linux, build-binaries-darwin, build-binaries-windows]
    if: ${{ !inputs.dry_run }}
    runs-on: depot-ubuntu-24.04-arm
    timeout-minutes: 10
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: ./artifacts
          merge-multiple: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::216938125589:role/alien-releases-upload
          aws-region: us-east-1

      - name: Upload to S3 (versioned + latest)
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"

          upload() {
            local binary=$1 target=$2 os=$3 arch=$4
            local src="./artifacts/binaries-${target}/target/${target}/release/${binary}"
            aws s3 cp "$src" "s3://alien-releases-prod/${binary}/v${VERSION}/${os}-${arch}/${binary}"
            aws s3 cp "$src" "s3://alien-releases-prod/${binary}/latest/${os}-${arch}/${binary}"
          }

          for binary in alien alien-deploy alien-agent alien-runtime; do
            upload "$binary" x86_64-unknown-linux-musl linux x86_64
            upload "$binary" aarch64-unknown-linux-musl linux aarch64
          done

          for binary in alien alien-deploy alien-agent; do
            upload "$binary" x86_64-apple-darwin darwin x86_64
            upload "$binary" aarch64-apple-darwin darwin aarch64
          done

          upload_exe() {
            local binary=$1 target=$2 os=$3 arch=$4
            local src="./artifacts/binaries-${target}/target/${target}/release/${binary}.exe"
            aws s3 cp "$src" "s3://alien-releases-prod/${binary}/v${VERSION}/${os}-${arch}/${binary}.exe"
            aws s3 cp "$src" "s3://alien-releases-prod/${binary}/latest/${os}-${arch}/${binary}.exe"
          }

          for binary in alien alien-deploy; do
            upload_exe "$binary" x86_64-pc-windows-gnu windows x86_64
          done

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.RELEASES_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # ─── Docker images + Helm chart ─────────────────────────────────────

  publish-images:
    needs: [prepare, build-binaries-linux]
    if: ${{ !inputs.dry_run }}
    runs-on: depot-ubuntu-24.04-arm-16
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Download linux binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*-unknown-linux-musl
          path: ./linux-bins
          merge-multiple: false

      - name: Place binaries in target layout for Dockerfiles
        run: |
          for target in x86_64-unknown-linux-musl aarch64-unknown-linux-musl; do
            mkdir -p "target/${target}/release"
            for binary in alien-agent alien-runtime; do
              cp "./linux-bins/binaries-${target}/target/${target}/release/${binary}" "target/${target}/release/${binary}"
              chmod +x "target/${target}/release/${binary}"
            done
          done

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Depot
        uses: depot/setup-action@v1

      - name: Metadata (alien-base)
        id: meta_base
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/alienplatform/alien-base
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ needs.prepare.outputs.version }}

      - name: Publish alien-base
        uses: depot/build-push-action@v1
        with:
          project: ${{ vars.DEPOT_PROJECT_ID }}
          context: .
          file: docker/Dockerfile.alien-base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_base.outputs.tags }}
          labels: ${{ steps.meta_base.outputs.labels }}
          provenance: true
          sbom: true

      - name: Metadata (alien-builder)
        id: meta_builder
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/alienplatform/alien-builder
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ needs.prepare.outputs.version }}

      - name: Publish alien-builder
        uses: depot/build-push-action@v1
        with:
          project: ${{ vars.DEPOT_PROJECT_ID }}
          context: .
          file: docker/Dockerfile.alien-builder
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_builder.outputs.tags }}
          labels: ${{ steps.meta_builder.outputs.labels }}
          provenance: true
          sbom: true

      - name: Metadata (alien-agent)
        id: meta_agent
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/alienplatform/alien-agent
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ needs.prepare.outputs.version }}

      - name: Publish alien-agent
        uses: depot/build-push-action@v1
        with:
          project: ${{ vars.DEPOT_PROJECT_ID }}
          context: .
          file: docker/Dockerfile.alien-agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_agent.outputs.tags }}
          labels: ${{ steps.meta_agent.outputs.labels }}
          provenance: true
          sbom: true

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          sed -i "s/^version:.*/version: $VERSION/" charts/alien-agent/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/alien-agent/Chart.yaml
          helm package charts/alien-agent

      - name: Push Helm chart to GHCR
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          helm push alien-agent-$VERSION.tgz oci://ghcr.io/alienplatform/charts
