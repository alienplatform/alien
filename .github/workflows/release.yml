name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print the computed version without publishing'
        type: boolean
        default: false

jobs:
  prepare:
    runs-on: depot-ubuntu-24.04-arm
    timeout-minutes: 10
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          fetch-depth: 0

      - name: Compute next version
        id: bump
        run: |
          LATEST_TAG=$(git describe --tags --match "v[0-9]*" --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT_VERSION=${LATEST_TAG#v}
          echo "Latest tag: $LATEST_TAG"

          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s%n%b")

          if echo "$COMMITS" | grep -qE "(BREAKING[- ]CHANGE|^[a-z]+(\([^)]+\))?!:)"; then
            BUMP=major
          elif echo "$COMMITS" | grep -qE "^feat(\([^)]+\))?:"; then
            BUMP=minor
          else
            BUMP=patch
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          case "$BUMP" in
            major) VERSION="$((MAJOR + 1)).0.0" ;;
            minor) VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          echo "Bump type: $BUMP"
          echo "New version: v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set workspace Cargo version
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          python3 - <<EOF
          import re, os
          v = os.environ['VERSION']
          with open('Cargo.toml', 'r') as f:
              content = f.read()
          content = re.sub(r'(\[workspace\.package\]\nversion = )"[^"]+"', rf'\1"{v}"', content)
          content = re.sub(r'(path = "[^"]+", version = )"[^"]+"', rf'\1"{v}"', content)
          with open('Cargo.toml', 'w') as f:
              f.write(content)
          EOF
        env:
          VERSION: ${{ steps.bump.outputs.version }}

      - name: Set npm package versions
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          for pkg in packages/core packages/bindings packages/testing packages/commands-client; do
            node -e "
              const fs = require('fs');
              const p = fs.readFileSync('${pkg}/package.json', 'utf8');
              const j = JSON.parse(p);
              j.version = process.env.VERSION;
              fs.writeFileSync('${pkg}/package.json', JSON.stringify(j, null, 2) + '\n');
            " VERSION="$VERSION"
          done

      - name: Commit and tag
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml packages/core/package.json packages/bindings/package.json packages/testing/package.json packages/commands-client/package.json
          git commit -m "chore: release v${VERSION}"
          git tag "v${VERSION}"
          git push
          git push --tags

  publish-crates:
    needs: prepare
    if: ${{ !inputs.dry_run }}
    runs-on: depot-ubuntu-24.04-arm-4
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Setup Depot
        uses: depot/setup-action@v1
        with:
          project: ${{ vars.DEPOT_PROJECT_ID }}

      - name: Install sccache
        uses: taiki-e/install-action@sccache

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Publish crates
        run: |
          for crate in \
            alien-error-derive \
            alien-macros \
            alien-error \
            alien-core \
            alien-client-core \
            alien-aws-clients \
            alien-gcp-clients \
            alien-azure-clients \
            alien-k8s-clients \
            alien-platform-api \
            alien-manager-api \
            alien-client-config \
            alien-permissions \
            alien-bindings \
            alien-commands; do
            echo "Publishing $crate..."
            depot cargo publish -p "$crate" --no-verify
            sleep 20
          done

  publish-npm:
    needs: prepare
    if: ${{ !inputs.dry_run }}
    runs-on: depot-ubuntu-24.04-arm-4
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm --filter @alienplatform/core publish --access public --no-git-checks
          pnpm --filter @alienplatform/bindings publish --access public --no-git-checks
          pnpm --filter @alienplatform/testing publish --access public --no-git-checks
          pnpm --filter @alienplatform/commands-client publish --access public --no-git-checks

  publish-cli:
    needs: prepare
    if: ${{ !inputs.dry_run }}
    runs-on: depot-ubuntu-24.04-arm-16
    timeout-minutes: 60
    permissions:
      contents: write
      id-token: write
    env:
      R2_BUCKET: ${{ vars.RELEASES_R2_BUCKET }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Setup Depot
        uses: depot/setup-action@v1
        with:
          project: ${{ vars.DEPOT_PROJECT_ID }}

      - name: Install sccache
        uses: taiki-e/install-action@sccache

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: depot cargo install cargo-zigbuild --locked

      - name: Add musl targets
        run: |
          rustup target add aarch64-unknown-linux-musl
          rustup target add x86_64-unknown-linux-musl

      - name: Build alien CLI (x86_64)
        run: |
          depot cargo zigbuild -p alien-cli --release \
            --target x86_64-unknown-linux-musl

      - name: Build alien CLI (aarch64)
        run: |
          depot cargo zigbuild -p alien-cli --release \
            --target aarch64-unknown-linux-musl

      - name: Upload to R2 (versioned + latest)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          S3="aws s3 --endpoint-url ${R2_ENDPOINT}"

          $S3 cp \
            target/x86_64-unknown-linux-musl/release/alien \
            "s3://${R2_BUCKET}/alien/v${VERSION}/linux-x86_64/alien"

          $S3 cp \
            target/aarch64-unknown-linux-musl/release/alien \
            "s3://${R2_BUCKET}/alien/v${VERSION}/linux-aarch64/alien"

          $S3 cp \
            target/x86_64-unknown-linux-musl/release/alien \
            "s3://${R2_BUCKET}/alien/latest/linux-x86_64/alien"

          $S3 cp \
            target/aarch64-unknown-linux-musl/release/alien \
            "s3://${R2_BUCKET}/alien/latest/linux-aarch64/alien"

      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"prefix_purge":["https://releases.alien.dev/alien/latest/"]}'
