name: Release

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Publication channel
        type: choice
        default: stable
        options: [stable, dev]
      source_ref:
        description: Exact 40-character source commit for dev npm packages
        type: string
        default: main
      dry_run:
        description: Validate without publishing
        type: boolean
        default: false

permissions:
  contents: write
  packages: write
  id-token: write

env:
  # Fall back to local compilation when the shared sccache backend returns a
  # transient error (e.g. webdav 403) instead of failing the whole build.
  SCCACHE_IGNORE_SERVER_IO_ERROR: "1"

jobs:
  publish-npm-dev:
    if: inputs.mode == 'dev'
    uses: ./.github/workflows/publish-npm-dev.yml
    with:
      source_ref: ${{ inputs.source_ref }}
      dry_run: ${{ inputs.dry_run }}
    secrets: inherit

  prepare:
    if: inputs.mode == 'stable'
    runs-on: depot-ubuntu-24.04-arm
    timeout-minutes: 10
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          fetch-depth: 0

      - name: Compute next version
        id: bump
        run: |
          LATEST_TAG=$(git tag --list "v[0-9]*" --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          CURRENT_VERSION=${LATEST_TAG#v}
          echo "Latest tag: $LATEST_TAG"

          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s%n%b")

          if echo "$COMMITS" | grep -qE "(BREAKING[- ]CHANGE|^[a-z]+(\([^)]+\))?!:)"; then
            BUMP=major
          elif echo "$COMMITS" | grep -qE "^feat(\([^)]+\))?:"; then
            BUMP=minor
          else
            BUMP=patch
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          case "$BUMP" in
            major) VERSION="$((MAJOR + 1)).0.0" ;;
            minor) VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          echo "Bump type: $BUMP"
          echo "New version: v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set workspace Cargo version
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          python3 - <<EOF
          import re, os
          v = os.environ['VERSION']
          with open('Cargo.toml', 'r') as f:
              content = f.read()
          content = re.sub(r'(\[workspace\.package\]\nversion = )"[^"]+"', rf'\1"{v}"', content)
          content = re.sub(r'(path = "[^"]+", version = )"[^"]+"', rf'\1"{v}"', content)
          with open('Cargo.toml', 'w') as f:
              f.write(content)
          EOF
        env:
          VERSION: ${{ steps.bump.outputs.version }}

      - name: Set npm package versions
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          # The bindings addon ships as a wrapper + per-platform prebuild packages
          # (crate manifest, wrapper, and each npm/<triple> skeleton) that must all
          # carry the release version BEFORE the native build on the runners, so the
          # loader embeds it and publish injects matching optionalDependencies.
          for pkg in packages/core packages/commands packages/sdk packages/testing \
            client-sdks/platform/typescript client-sdks/manager/typescript \
            packages/bindings crates/alien-bindings-node \
            packages/bindings/npm/darwin-arm64 packages/bindings/npm/darwin-x64 \
            packages/bindings/npm/linux-x64-gnu packages/bindings/npm/linux-arm64-gnu; do
            node -e "
              const fs = require('fs');
              const path = '${pkg}/package.json';
              const content = fs.readFileSync(path, 'utf8');
              fs.writeFileSync(path, content.replace(/\"version\": \"[^\"]*\"/, '\"version\": \"${VERSION}\"'));
            "
          done

      # Dry-run build jobs start from the untagged commit, so carry the exact
      # versioned manifests that a real release would commit into those fresh
      # checkouts. This keeps the addon binary, wrapper, and platform packages
      # on one computed version without mutating git or publishing anything.
      - name: Upload versioned manifests for dry run
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@v6
        with:
          name: release-version-manifests
          retention-days: 1
          path: |
            Cargo.toml
            packages/core/package.json
            packages/commands/package.json
            packages/sdk/package.json
            packages/testing/package.json
            client-sdks/platform/typescript/package.json
            client-sdks/manager/typescript/package.json
            packages/bindings/package.json
            crates/alien-bindings-node/package.json
            packages/bindings/npm/darwin-arm64/package.json
            packages/bindings/npm/darwin-x64/package.json
            packages/bindings/npm/linux-x64-gnu/package.json
            packages/bindings/npm/linux-arm64-gnu/package.json

      - name: Commit and tag
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml packages/core/package.json packages/commands/package.json \
            packages/sdk/package.json packages/testing/package.json \
            client-sdks/platform/typescript/package.json client-sdks/manager/typescript/package.json \
            packages/bindings/package.json crates/alien-bindings-node/package.json \
            packages/bindings/npm/darwin-arm64/package.json packages/bindings/npm/darwin-x64/package.json \
            packages/bindings/npm/linux-x64-gnu/package.json packages/bindings/npm/linux-arm64-gnu/package.json
          git commit -m "chore: release v${VERSION}"
          git tag "v${VERSION}"
          git push
          git push --tags

  # ─── Changelog generation ──────────────────────────────────────────

  generate-changelog:
    needs: prepare
    if: ${{ inputs.mode == 'stable' && !inputs.dry_run }}
    runs-on: depot-ubuntu-24.04-arm
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          ref: v${{ needs.prepare.outputs.version }}
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG-release.md

      - name: Upload changelog
        uses: actions/upload-artifact@v6
        with:
          name: changelog
          retention-days: 1
          path: CHANGELOG-release.md

  # ─── Registry publishing (crates.io + npm) ──────────────────────────

  publish-crates:
    needs: [prepare]
    if: ${{ inputs.mode == 'stable' && !inputs.dry_run }}
    runs-on: depot-ubuntu-24.04-arm-4
    timeout-minutes: 60
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - uses: dtolnay/rust-toolchain@nightly

      - name: Configure git credentials
        run: git config --global url."https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - uses: depot/setup-action@v1

      - uses: mozilla-actions/sccache-action@v0.0.10
        continue-on-error: true
        with:
          version: v0.16.0

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ github.token }}

      - name: Publish crates
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          for crate in \
            alien-error-derive \
            alien-macros \
            alien-error \
            alien-core \
            alien-client-core \
            alien-aws-clients \
            alien-gcp-clients \
            alien-azure-clients \
            alien-k8s-clients \
            alien-platform-api \
            alien-manager-api \
            alien-client-config \
            alien-permissions \
            alien-bindings \
            alien-worker-protocol \
            alien-sdk \
            alien-commands \
            alien-commands-client; do
            echo "Publishing $crate..."
            depot cargo publish -p "$crate" --no-verify
            sleep 20
          done

  publish-npm:
    needs: [prepare]
    if: ${{ inputs.mode == 'stable' && !inputs.dry_run }}
    runs-on: depot-ubuntu-24.04-arm-4
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Validate npm auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm whoami

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm --filter @alienplatform/core publish --access public --no-git-checks
          # commands must land before testing: @alienplatform/testing depends on it,
          # and publish rewrites the workspace:* range to this release's version.
          pnpm --filter @alienplatform/commands publish --access public --no-git-checks
          pnpm --filter @alienplatform/sdk publish --access public --no-git-checks
          pnpm --filter @alienplatform/testing publish --access public --no-git-checks

  publish-client-sdks:
    needs: [prepare]
    if: ${{ inputs.mode == 'stable' && !inputs.dry_run }}
    runs-on: depot-ubuntu-24.04-arm-4
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Validate npm auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm whoami

      - name: Build and publish platform API SDK
        working-directory: client-sdks/platform/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: |
          npm install
          npm run build
          npm publish --access public

      - name: Build and publish manager API SDK
        working-directory: client-sdks/manager/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm install
          npm run build
          npm publish --access public

  # ─── Native addon prebuilds (@alienplatform/bindings) ──────────────
  #
  # The bindings addon publishes as a thin wrapper plus per-platform prebuild
  # packages (`@alienplatform/bindings-<triple>`) that carry a compiled `.node`,
  # so `npm install @alienplatform/bindings` needs no Rust toolchain. Each triple
  # builds on its native runner (darwin-x64 cross-builds on the arm mac — same
  # toolchain via `--target`). Unlike the other build/publish jobs, build-addon
  # and publish-bindings also run on dry_run (checking out the untagged HEAD and
  # publishing with `--dry-run`) so a maintainer can validate the whole
  # build → smoke → publish path — including the linux halves that can't run
  # pre-merge — without cutting a real release.

  build-addon:
    needs: prepare
    if: inputs.mode == 'stable'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: depot-macos-15
            os: macos
            target: aarch64-apple-darwin
            triple: darwin-arm64
            expect_arch: arm64
          - runner: depot-macos-15
            os: macos
            target: x86_64-apple-darwin
            triple: darwin-x64
            expect_arch: x86_64
          - runner: depot-ubuntu-24.04-16
            os: linux
            target: x86_64-unknown-linux-gnu
            triple: linux-x64-gnu
            expect_arch: x86-64
          - runner: depot-ubuntu-24.04-arm-16
            os: linux
            target: aarch64-unknown-linux-gnu
            triple: linux-arm64-gnu
            expect_arch: aarch64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.dry_run && github.sha || format('v{0}', needs.prepare.outputs.version) }}

      - name: Apply computed version for dry run
        if: ${{ inputs.dry_run }}
        uses: actions/download-artifact@v7
        with:
          name: release-version-manifests
          path: .

      - name: Validate bindings release version lockstep
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: node packages/bindings/scripts/validate-release-version.mjs "$VERSION"

      # Rust toolchain: Linux via the shared composite; macOS uses dtolnay +
      # brew protoc directly (plain `napi build`, not `depot cargo`, so no
      # Depot/sccache setup here). The addon depends on alien-bindings, whose
      # build.rs needs protoc.
      - name: Setup Rust (linux)
        if: matrix.os == 'linux'
        uses: ./.github/actions/setup-rust
        with:
          depot-project-id: ${{ vars.DEPOT_PROJECT_ID }}
          repo-access-token: ${{ secrets.REPO_ACCESS_TOKEN }}
          install-protoc: "true"

      - uses: dtolnay/rust-toolchain@nightly
        if: matrix.os == 'macos'

      - name: Configure git credentials for cargo (macos)
        if: matrix.os == 'macos'
        run: git config --global url."https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install protoc (macos)
        if: matrix.os == 'macos'
        run: brew install protobuf

      - name: Add cross target (darwin-x64)
        if: matrix.target == 'x86_64-apple-darwin'
        run: rustup target add x86_64-apple-darwin

      - uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build addon (${{ matrix.triple }})
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          pnpm --filter @alienplatform/bindings exec napi build \
            --platform --release --target ${{ matrix.target }} \
            --cwd "$GITHUB_WORKSPACE/crates/alien-bindings-node"

      - name: Stage addon into platform package
        run: |
          cp "crates/alien-bindings-node/alien-bindings-node.${{ matrix.triple }}.node" \
            "packages/bindings/npm/${{ matrix.triple }}/alien-bindings-node.${{ matrix.triple }}.node"

      # Closes the wrong-arch hole on the two legs the smoke step doesn't cover.
      - name: Assert staged binary architecture
        run: file "packages/bindings/npm/${{ matrix.triple }}/alien-bindings-node.${{ matrix.triple }}.node" | grep -q "${{ matrix.expect_arch }}"

      - name: Upload addon artifact
        uses: actions/upload-artifact@v6
        with:
          name: addon-${{ matrix.triple }}
          retention-days: 1
          path: packages/bindings/npm/${{ matrix.triple }}/alien-bindings-node.${{ matrix.triple }}.node

  # This job deliberately has no Rust compiler or protoc setup. It
  # starts from the already-built artifacts and proves that a consumer whose
  # only direct dependency is @alienplatform/bindings gets the right optional
  # platform package. Native runners additionally exercise npm + Node and Bun
  # installs with a real local-provider KV operation.
  smoke-addon:
    needs: [prepare, build-addon]
    if: inputs.mode == 'stable'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: depot-macos-15
            triple: darwin-arm64
            execute: true
          - runner: depot-macos-15
            triple: darwin-x64
            execute: false
          - runner: depot-ubuntu-24.04-16
            triple: linux-x64-gnu
            execute: true
          - runner: depot-ubuntu-24.04-arm-16
            triple: linux-arm64-gnu
            execute: true
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.dry_run && github.sha || format('v{0}', needs.prepare.outputs.version) }}

      - name: Apply computed version for dry run
        if: ${{ inputs.dry_run }}
        uses: actions/download-artifact@v7
        with:
          name: release-version-manifests
          path: .

      - name: Validate bindings release version lockstep
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: node packages/bindings/scripts/validate-release-version.mjs "$VERSION"

      - uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        if: matrix.execute
        with:
          bun-version: "1.3.14"

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Download staged addon (${{ matrix.triple }})
        uses: actions/download-artifact@v7
        with:
          name: addon-${{ matrix.triple }}
          path: packages/bindings/npm/${{ matrix.triple }}

      - name: Verify wrapper-only prebuild install (${{ matrix.triple }})
        env:
          EXECUTE_NATIVE: ${{ matrix.execute }}
        run: |
          args=("${{ matrix.triple }}")
          if [ "$EXECUTE_NATIVE" = "true" ]; then args+=(--execute); fi
          bash scripts/smoke-addon-prebuild.sh "${args[@]}"

  publish-bindings:
    needs: [prepare, smoke-addon, publish-npm]
    # publish-npm skips on dry_run, so a bare `needs` would cascade-skip the
    # dry-run path this job deliberately supports. On a real release, wait for
    # publish-npm to succeed: the wrapper's package.json pins
    # `@alienplatform/core: ^<release>`, so publishing it while core's publish
    # failed leaves every `npm install @alienplatform/bindings` ETARGET-broken.
    if: inputs.mode == 'stable' && always() && needs.smoke-addon.result == 'success' && (inputs.dry_run || needs.publish-npm.result == 'success')
    runs-on: depot-ubuntu-24.04-arm-4
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.dry_run && github.sha || format('v{0}', needs.prepare.outputs.version) }}

      - name: Apply computed version for dry run
        if: ${{ inputs.dry_run }}
        uses: actions/download-artifact@v7
        with:
          name: release-version-manifests
          path: .

      - name: Validate bindings release version lockstep
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: node packages/bindings/scripts/validate-release-version.mjs "$VERSION"

      - uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Validate npm auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm whoami

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download addon artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: addon-*
          path: ./addons
          merge-multiple: false

      - name: Stage addons into platform packages
        run: |
          for triple in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu; do
            cp "./addons/addon-${triple}/alien-bindings-node.${triple}.node" \
              "packages/bindings/npm/${triple}/alien-bindings-node.${triple}.node"
          done

      - name: Build wrapper
        run: pnpm --filter @alienplatform/bindings build

      # Platform packages publish FIRST so an install of the wrapper can never
      # race ahead of the optionalDependencies it pins.
      - name: Publish platform prebuild packages (first)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          for triple in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu; do
            package="@alienplatform/bindings-${triple}"
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "Dry-running ${package}@${VERSION}..."
              ( cd "packages/bindings/npm/${triple}" && npm publish --access public --dry-run )
              continue
            fi

            # npm has no multi-package transaction. Publishing every platform
            # before the wrapper keeps incomplete releases unreachable, while
            # this existence check makes a retry resume after a partial publish.
            published="$(npm view "${package}@${VERSION}" version 2>/dev/null || true)"
            if [ "$published" = "$VERSION" ]; then
              echo "${package}@${VERSION} is already published; continuing"
            else
              echo "Publishing ${package}@${VERSION}..."
              ( cd "packages/bindings/npm/${triple}" && npm publish --access public )
            fi
          done

      # Inject exact-version optionalDependencies explicitly (see the script) —
      # more deterministic and reviewable than `napi prepublish`.
      - name: Inject optionalDependencies into the wrapper
        run: node packages/bindings/scripts/inject-optional-deps.mjs

      - name: Publish wrapper (last)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            pnpm --filter @alienplatform/bindings publish --access public --no-git-checks --dry-run
            exit 0
          fi

          published="$(npm view "@alienplatform/bindings@${VERSION}" version 2>/dev/null || true)"
          if [ "$published" = "$VERSION" ]; then
            echo "@alienplatform/bindings@${VERSION} is already published; continuing"
          else
            pnpm --filter @alienplatform/bindings publish --access public --no-git-checks
          fi

  # ─── Binary builds (4 targets, all parallel) ───────────────────────

  build-binaries-linux-x86_64:
    needs: prepare
    if: ${{ inputs.mode == 'stable' && !inputs.dry_run }}
    runs-on: depot-ubuntu-24.04-16
    timeout-minutes: 60
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v5
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Restore binaries from cache
        id: binary-cache
        uses: actions/cache@v5
        with:
          path: |
            target/x86_64-unknown-linux-musl/release/alien
            target/x86_64-unknown-linux-musl/release/alien-deploy
            target/x86_64-unknown-linux-musl/release/alien-operator
            target/x86_64-unknown-linux-musl/release/alien-worker-runtime
            target/x86_64-unknown-linux-musl/release/alien-manager
          key: release-linux-x86_64-v${{ needs.prepare.outputs.version }}

      - uses: ./.github/actions/setup-rust
        if: steps.binary-cache.outputs.cache-hit != 'true'
        with:
          depot-project-id: ${{ vars.DEPOT_PROJECT_ID }}
          repo-access-token: ${{ secrets.REPO_ACCESS_TOKEN }}
          targets: x86_64-unknown-linux-musl
          install-protoc: "true"

      - name: Build x86_64 linux binaries
        if: steps.binary-cache.outputs.cache-hit != 'true'
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          depot cargo build --release \
            -p alien-cli -p alien-deploy-cli -p alien-operator -p alien-worker-runtime -p alien-manager \
            --target x86_64-unknown-linux-musl

      - name: Stage binaries for upload
        run: |
          mkdir -p staged/x86_64-unknown-linux-musl
          for binary in alien alien-deploy alien-operator alien-worker-runtime alien-manager; do
            cp "target/x86_64-unknown-linux-musl/release/${binary}" "staged/x86_64-unknown-linux-musl/${binary}"
          done

      - name: Upload x86_64 linux binaries
        uses: actions/upload-artifact@v6
        with:
          name: binaries-x86_64-unknown-linux-musl
          retention-days: 1
          path: staged/x86_64-unknown-linux-musl/

  build-binaries-linux-aarch64:
    needs: prepare
    if: ${{ inputs.mode == 'stable' && !inputs.dry_run }}
    runs-on: depot-ubuntu-24.04-arm-16
    timeout-minutes: 60
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v5
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Restore binaries from cache
        id: binary-cache
        uses: actions/cache@v5
        with:
          path: |
            target/aarch64-unknown-linux-musl/release/alien
            target/aarch64-unknown-linux-musl/release/alien-deploy
            target/aarch64-unknown-linux-musl/release/alien-operator
            target/aarch64-unknown-linux-musl/release/alien-worker-runtime
            target/aarch64-unknown-linux-musl/release/alien-manager
          key: release-linux-aarch64-v${{ needs.prepare.outputs.version }}

      - uses: ./.github/actions/setup-rust
        if: steps.binary-cache.outputs.cache-hit != 'true'
        with:
          depot-project-id: ${{ vars.DEPOT_PROJECT_ID }}
          repo-access-token: ${{ secrets.REPO_ACCESS_TOKEN }}
          targets: aarch64-unknown-linux-musl
          install-protoc: "true"

      - name: Build aarch64 linux binaries
        if: steps.binary-cache.outputs.cache-hit != 'true'
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          depot cargo build --release \
            -p alien-cli -p alien-deploy-cli -p alien-operator -p alien-worker-runtime -p alien-manager \
            --target aarch64-unknown-linux-musl

      - name: Stage binaries for upload
        run: |
          mkdir -p staged/aarch64-unknown-linux-musl
          for binary in alien alien-deploy alien-operator alien-worker-runtime alien-manager; do
            cp "target/aarch64-unknown-linux-musl/release/${binary}" "staged/aarch64-unknown-linux-musl/${binary}"
          done

      - name: Upload aarch64 linux binaries
        uses: actions/upload-artifact@v6
        with:
          name: binaries-aarch64-unknown-linux-musl
          retention-days: 1
          path: staged/aarch64-unknown-linux-musl/

  # ─── macOS build (aarch64 only, native) ────────────────────────────

  build-binaries-darwin:
    needs: prepare
    if: ${{ inputs.mode == 'stable' && !inputs.dry_run }}
    runs-on: depot-macos-15
    timeout-minutes: 60
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v5
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Restore binaries from cache
        id: binary-cache
        uses: actions/cache@v5
        with:
          path: |
            target/aarch64-apple-darwin/release/alien
            target/aarch64-apple-darwin/release/alien-deploy
            target/aarch64-apple-darwin/release/alien-operator
          key: release-darwin-aarch64-v${{ needs.prepare.outputs.version }}

      - uses: dtolnay/rust-toolchain@nightly
        if: steps.binary-cache.outputs.cache-hit != 'true'

      - name: Configure git credentials for cargo
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: |
          git config --global url."https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Depot
        if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: depot/setup-action@v1

      - name: Install sccache
        if: steps.binary-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: v0.16.0

      - name: Install protoc
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: brew install protobuf

      - name: Build aarch64 darwin binaries
        if: steps.binary-cache.outputs.cache-hit != 'true'
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          depot cargo build --release \
            -p alien-cli -p alien-deploy-cli -p alien-operator \
            --target aarch64-apple-darwin

      - name: Stage binaries for upload
        run: |
          mkdir -p staged/aarch64-apple-darwin
          for binary in alien alien-deploy alien-operator; do
            cp "target/aarch64-apple-darwin/release/${binary}" "staged/aarch64-apple-darwin/${binary}"
          done

      - name: Upload aarch64 darwin binaries
        uses: actions/upload-artifact@v6
        with:
          name: binaries-aarch64-apple-darwin
          retention-days: 1
          path: staged/aarch64-apple-darwin/

  # ─── Windows build (x86_64, native MSVC) ──────────────────────────

  build-binaries-windows:
    needs: prepare
    if: ${{ inputs.mode == 'stable' && !inputs.dry_run }}
    runs-on: depot-windows-2025-16
    timeout-minutes: 60
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v5
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Restore binaries from cache
        id: binary-cache
        uses: actions/cache@v5
        with:
          path: |
            target/x86_64-pc-windows-msvc/release/alien.exe
            target/x86_64-pc-windows-msvc/release/alien-deploy.exe
            target/x86_64-pc-windows-msvc/release/alien-operator.exe
          key: release-windows-x86_64-v${{ needs.prepare.outputs.version }}

      - uses: dtolnay/rust-toolchain@nightly
        if: steps.binary-cache.outputs.cache-hit != 'true'

      - name: Configure git credentials for cargo
        if: steps.binary-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git config --global url."https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      # depot cargo is Linux/macOS only — use sccache directly on Windows
      - name: Install sccache
        if: steps.binary-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: v0.16.0

      - name: Install build tools (protoc, nasm, cmake)
        if: steps.binary-cache.outputs.cache-hit != 'true'
        shell: bash
        run: choco install protoc nasm cmake -y

      - name: Build windows binaries
        if: steps.binary-cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
          AWS_LC_SYS_CMAKE_BUILDER: "1"
        run: |
          export PATH="/c/Program Files/NASM:$PATH"
          cargo build --release \
            -p alien-cli -p alien-deploy-cli -p alien-operator \
            --target x86_64-pc-windows-msvc

      - name: Stage binaries for upload
        shell: bash
        run: |
          mkdir -p staged/x86_64-pc-windows-msvc
          cp target/x86_64-pc-windows-msvc/release/alien.exe staged/x86_64-pc-windows-msvc/
          cp target/x86_64-pc-windows-msvc/release/alien-deploy.exe staged/x86_64-pc-windows-msvc/
          cp target/x86_64-pc-windows-msvc/release/alien-operator.exe staged/x86_64-pc-windows-msvc/

      - name: Upload windows binaries
        uses: actions/upload-artifact@v6
        with:
          name: binaries-x86_64-pc-windows-msvc
          retention-days: 1
          path: staged/x86_64-pc-windows-msvc/

  # ─── Upload binaries to S3 ──────────────────────────────────────────

  upload-binaries:
    needs: [prepare, build-binaries-linux-x86_64, build-binaries-linux-aarch64, build-binaries-darwin, build-binaries-windows]
    if: ${{ inputs.mode == 'stable' && !inputs.dry_run }}
    runs-on: depot-ubuntu-24.04-arm
    timeout-minutes: 10
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: binaries-*
          path: ./artifacts
          merge-multiple: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::216938125589:role/alien-releases-upload
          aws-region: us-east-1

      - name: Upload to S3 (versioned + latest)
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"

          # Artifacts are downloaded as: ./artifacts/binaries-<target>/<binary>
          upload() {
            local binary=$1 target=$2 os=$3 arch=$4
            local src="./artifacts/binaries-${target}/${binary}"
            aws s3 cp "$src" "s3://alien-releases-prod/${binary}/v${VERSION}/${os}-${arch}/${binary}"
            aws s3 cp "$src" "s3://alien-releases-prod/${binary}/latest/${os}-${arch}/${binary}"
          }

          for binary in alien alien-deploy alien-operator alien-worker-runtime alien-manager; do
            upload "$binary" x86_64-unknown-linux-musl linux x86_64
            upload "$binary" aarch64-unknown-linux-musl linux aarch64
          done

          for binary in alien alien-deploy alien-operator; do
            upload "$binary" aarch64-apple-darwin darwin aarch64
          done

          upload_exe() {
            local binary=$1 target=$2 os=$3 arch=$4
            local src="./artifacts/binaries-${target}/${binary}.exe"
            aws s3 cp "$src" "s3://alien-releases-prod/${binary}/v${VERSION}/${os}-${arch}/${binary}.exe"
            aws s3 cp "$src" "s3://alien-releases-prod/${binary}/latest/${os}-${arch}/${binary}.exe"
          }

          for binary in alien alien-deploy alien-operator; do
            upload_exe "$binary" x86_64-pc-windows-msvc windows x86_64
          done

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.RELEASES_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # ─── GitHub Release ────────────────────────────────────────────────

  create-github-release:
    needs: [prepare, generate-changelog, build-binaries-linux-x86_64, build-binaries-linux-aarch64, build-binaries-darwin, build-binaries-windows]
    if: ${{ inputs.mode == 'stable' && !inputs.dry_run }}
    runs-on: depot-ubuntu-24.04-arm
    timeout-minutes: 10
    steps:
      - name: Download all binary artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: binaries-*
          path: ./artifacts
          merge-multiple: false

      - name: Download changelog
        uses: actions/download-artifact@v7
        with:
          name: changelog
          path: .

      - name: Create release archives
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          mkdir -p dist

          # Linux x86_64 tarball
          tar -czf "dist/alien-v${VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            -C artifacts/binaries-x86_64-unknown-linux-musl \
            alien alien-deploy alien-operator alien-worker-runtime alien-manager

          # Linux aarch64 tarball
          tar -czf "dist/alien-v${VERSION}-aarch64-unknown-linux-musl.tar.gz" \
            -C artifacts/binaries-aarch64-unknown-linux-musl \
            alien alien-deploy alien-operator alien-worker-runtime alien-manager

          # macOS aarch64 tarball
          tar -czf "dist/alien-v${VERSION}-aarch64-apple-darwin.tar.gz" \
            -C artifacts/binaries-aarch64-apple-darwin \
            alien alien-deploy alien-operator

          # Windows x86_64 zip
          (cd artifacts/binaries-x86_64-pc-windows-msvc && \
            zip "../../dist/alien-v${VERSION}-x86_64-pc-windows-msvc.zip" \
            alien.exe alien-deploy.exe alien-operator.exe)

      - name: Generate checksums
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          cd dist
          sha256sum alien-v${VERSION}-*.tar.gz alien-v${VERSION}-*.zip > "alien-v${VERSION}-checksums.txt"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: Alien v${{ needs.prepare.outputs.version }}
          body_path: CHANGELOG-release.md
          files: |
            dist/alien-v*-*.tar.gz
            dist/alien-v*-*.zip
            dist/alien-v*-checksums.txt
          draft: false
          prerelease: false

  # ─── Docker images + Helm chart ─────────────────────────────────────

  publish-images:
    needs: [prepare, build-binaries-linux-x86_64, build-binaries-linux-aarch64, build-binaries-darwin, build-binaries-windows]
    if: ${{ inputs.mode == 'stable' && !inputs.dry_run }}
    runs-on: depot-ubuntu-24.04-arm-16
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Download linux binaries
        uses: actions/download-artifact@v7
        with:
          pattern: binaries-*-unknown-linux-musl
          path: ./linux-bins
          merge-multiple: false

      - name: Place binaries in target layout for Dockerfiles
        run: |
          for target in x86_64-unknown-linux-musl aarch64-unknown-linux-musl; do
            mkdir -p "target/${target}/release"
            for binary in alien-operator alien-worker-runtime alien-manager; do
              cp "./linux-bins/binaries-${target}/${binary}" "target/${target}/release/${binary}"
              chmod +x "target/${target}/release/${binary}"
            done
          done

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Depot
        uses: depot/setup-action@v1

      - name: Metadata (alien-base)
        id: meta_base
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/alienplatform/alien-base
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ needs.prepare.outputs.version }}

      - name: Publish alien-base
        uses: depot/build-push-action@v1
        with:
          project: ${{ vars.DEPOT_PROJECT_ID }}
          context: .
          file: docker/Dockerfile.alien-base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_base.outputs.tags }}
          labels: ${{ steps.meta_base.outputs.labels }}
          provenance: true
          sbom: true

      - name: Metadata (alien-builder)
        id: meta_builder
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/alienplatform/alien-builder
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ needs.prepare.outputs.version }}

      - name: Publish alien-builder
        uses: depot/build-push-action@v1
        with:
          project: ${{ vars.DEPOT_PROJECT_ID }}
          context: .
          file: docker/Dockerfile.alien-builder
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_builder.outputs.tags }}
          labels: ${{ steps.meta_builder.outputs.labels }}
          provenance: true
          sbom: true

      - name: Metadata (alien-operator)
        id: meta_agent
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/alienplatform/alien-operator
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ needs.prepare.outputs.version }}

      - name: Publish alien-operator
        uses: depot/build-push-action@v1
        with:
          project: ${{ vars.DEPOT_PROJECT_ID }}
          context: .
          file: docker/Dockerfile.alien-operator
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_agent.outputs.tags }}
          labels: ${{ steps.meta_agent.outputs.labels }}
          provenance: true
          sbom: true

      - name: Metadata (alien-manager)
        id: meta_manager
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/alienplatform/alien-manager
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ needs.prepare.outputs.version }}

      - name: Publish alien-manager
        uses: depot/build-push-action@v1
        with:
          project: ${{ vars.DEPOT_PROJECT_ID }}
          context: .
          file: docker/Dockerfile.alien-manager
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_manager.outputs.tags }}
          labels: ${{ steps.meta_manager.outputs.labels }}
          provenance: true
          sbom: true

  # ─── Homebrew tap ──────────────────────────────────────────────────

  publish-homebrew-tap:
    needs: [prepare, create-github-release]
    if: ${{ inputs.mode == 'stable' && !inputs.dry_run }}
    runs-on: depot-ubuntu-24.04-arm
    timeout-minutes: 10
    steps:
      - name: Download release checksums
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          gh release download "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --pattern "alien-v${VERSION}-checksums.txt" \
            --dir .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse checksums
        id: checksums
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          FILE="alien-v${VERSION}-checksums.txt"
          echo "linux_x64=$(grep 'x86_64-unknown-linux-musl' "$FILE" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(grep 'aarch64-unknown-linux-musl' "$FILE" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "darwin_arm64=$(grep 'aarch64-apple-darwin' "$FILE" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Generate Homebrew formula
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          REPO="${{ github.repository }}"
          cat > alien.rb << 'FORMULA_EOF'
          class Alien < Formula
            desc "Alien Developer Platform CLI"
            homepage "https://alien.dev"
            version "VERSION_PLACEHOLDER"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/REPO_PLACEHOLDER/releases/download/vVERSION_PLACEHOLDER/alien-vVERSION_PLACEHOLDER-aarch64-apple-darwin.tar.gz"
                sha256 "SHA_DARWIN_ARM64_PLACEHOLDER"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/REPO_PLACEHOLDER/releases/download/vVERSION_PLACEHOLDER/alien-vVERSION_PLACEHOLDER-x86_64-unknown-linux-musl.tar.gz"
                sha256 "SHA_LINUX_X64_PLACEHOLDER"
              end
              on_arm do
                url "https://github.com/REPO_PLACEHOLDER/releases/download/vVERSION_PLACEHOLDER/alien-vVERSION_PLACEHOLDER-aarch64-unknown-linux-musl.tar.gz"
                sha256 "SHA_LINUX_ARM64_PLACEHOLDER"
              end
            end

            def install
              bin.install "alien"
              bin.install "alien-deploy"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/alien --version")
            end
          end
          FORMULA_EOF

          sed -i "s|VERSION_PLACEHOLDER|${VERSION}|g" alien.rb
          sed -i "s|REPO_PLACEHOLDER|${REPO}|g" alien.rb
          sed -i "s|SHA_LINUX_X64_PLACEHOLDER|${{ steps.checksums.outputs.linux_x64 }}|g" alien.rb
          sed -i "s|SHA_LINUX_ARM64_PLACEHOLDER|${{ steps.checksums.outputs.linux_arm64 }}|g" alien.rb
          sed -i "s|SHA_DARWIN_ARM64_PLACEHOLDER|${{ steps.checksums.outputs.darwin_arm64 }}|g" alien.rb

      - name: Push formula to tap
        run: |
          git clone "https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com/alienplatform/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp alien.rb tap/Formula/alien.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/alien.rb
          git diff --staged --quiet || git commit -m "Update alien to v${{ needs.prepare.outputs.version }}"
          git push

  # ─── npm CLI wrapper ───────────────────────────────────────────────

  publish-npm-cli-wrapper:
    needs: [prepare, build-binaries-linux-x86_64, build-binaries-linux-aarch64, build-binaries-darwin, build-binaries-windows]
    if: ${{ inputs.mode == 'stable' && !inputs.dry_run }}
    runs-on: depot-ubuntu-24.04-arm
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Validate npm auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm whoami

      - name: Download all binary artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: binaries-*
          path: ./artifacts
          merge-multiple: false

      - name: Build and publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: bash scripts/build-npm-packages.sh
