name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print the computed version without publishing'
        type: boolean
        default: false

jobs:
  prepare:
    runs-on: depot-ubuntu-24.04-arm
    timeout-minutes: 10
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          fetch-depth: 0

      - name: Compute next version
        id: bump
        run: |
          LATEST_TAG=$(git describe --tags --match "v[0-9]*" --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT_VERSION=${LATEST_TAG#v}
          echo "Latest tag: $LATEST_TAG"

          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s%n%b")

          if echo "$COMMITS" | grep -qE "(BREAKING[- ]CHANGE|^[a-z]+(\([^)]+\))?!:)"; then
            BUMP=major
          elif echo "$COMMITS" | grep -qE "^feat(\([^)]+\))?:"; then
            BUMP=minor
          else
            BUMP=patch
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          case "$BUMP" in
            major) VERSION="$((MAJOR + 1)).0.0" ;;
            minor) VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          echo "Bump type: $BUMP"
          echo "New version: v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set workspace Cargo version
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          python3 - <<EOF
          import re, os
          v = os.environ['VERSION']
          with open('Cargo.toml', 'r') as f:
              content = f.read()
          content = re.sub(r'(\[workspace\.package\]\nversion = )"[^"]+"', rf'\1"{v}"', content)
          content = re.sub(r'(path = "[^"]+", version = )"[^"]+"', rf'\1"{v}"', content)
          with open('Cargo.toml', 'w') as f:
              f.write(content)
          EOF
        env:
          VERSION: ${{ steps.bump.outputs.version }}

      - name: Set npm package versions
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          for pkg in packages/core packages/bindings packages/testing packages/commands-client; do
            node -e "
              const fs = require('fs');
              const p = fs.readFileSync('${pkg}/package.json', 'utf8');
              const j = JSON.parse(p);
              j.version = process.env.VERSION;
              fs.writeFileSync('${pkg}/package.json', JSON.stringify(j, null, 2) + '\n');
            " VERSION="$VERSION"
          done

      - name: Commit and tag
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml packages/core/package.json packages/bindings/package.json packages/testing/package.json packages/commands-client/package.json
          git commit -m "chore: release v${VERSION}"
          git tag "v${VERSION}"
          git push
          git push --tags

  publish-crates:
    needs: prepare
    if: ${{ !inputs.dry_run }}
    runs-on: depot-ubuntu-24.04-arm-4
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Configure git credentials for cargo
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com" > ~/.git-credentials
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"

      - name: Setup Depot
        uses: depot/setup-action@v1

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Publish crates
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          for crate in \
            alien-error-derive \
            alien-macros \
            alien-error \
            alien-core \
            alien-client-core \
            alien-aws-clients \
            alien-gcp-clients \
            alien-azure-clients \
            alien-k8s-clients \
            alien-platform-api \
            alien-manager-api \
            alien-client-config \
            alien-permissions \
            alien-bindings \
            alien-commands; do
            echo "Publishing $crate..."
            depot cargo publish -p "$crate" --no-verify
            sleep 20
          done

  publish-npm:
    needs: prepare
    if: ${{ !inputs.dry_run }}
    runs-on: depot-ubuntu-24.04-arm-4
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm --filter @alienplatform/core publish --access public --no-git-checks
          pnpm --filter @alienplatform/bindings publish --access public --no-git-checks
          pnpm --filter @alienplatform/testing publish --access public --no-git-checks
          pnpm --filter @alienplatform/commands-client publish --access public --no-git-checks

  build-binaries-linux:
    needs: prepare
    if: ${{ !inputs.dry_run }}
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    runs-on: depot-ubuntu-24.04-arm-8
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Configure git credentials for cargo
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com" > ~/.git-credentials
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"

      - name: Setup Depot
        uses: depot/setup-action@v1

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: depot cargo install cargo-zigbuild --locked

      - name: Add musl target
        run: rustup target add ${{ matrix.target }}

      - name: Build alien CLI
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          depot cargo zigbuild -p alien-cli --release \
            --target ${{ matrix.target }}

      - name: Build alien-deploy CLI
        run: |
          depot cargo zigbuild -p alien-deploy-cli --release \
            --target ${{ matrix.target }}

      - name: Build alien-agent
        run: |
          depot cargo zigbuild -p alien-agent --release \
            --target ${{ matrix.target }}

      - name: Upload alien-cli binary
        uses: actions/upload-artifact@v4
        with:
          name: alien-cli-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/alien

      - name: Upload alien-deploy binary
        uses: actions/upload-artifact@v4
        with:
          name: alien-deploy-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/alien-deploy

      - name: Upload alien-agent binary
        uses: actions/upload-artifact@v4
        with:
          name: alien-agent-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/alien-agent

  build-binaries-macos:
    needs: prepare
    if: ${{ !inputs.dry_run }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: aarch64-apple-darwin
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install protoc
        run: brew install protobuf

      - name: Build alien CLI
        run: cargo build -p alien-cli --release --target ${{ matrix.target }}

      - name: Build alien-deploy CLI
        run: cargo build -p alien-deploy-cli --release --target ${{ matrix.target }}

      - name: Build alien-agent
        run: cargo build -p alien-agent --release --target ${{ matrix.target }}

      - name: Upload alien-cli binary
        uses: actions/upload-artifact@v4
        with:
          name: alien-cli-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/alien

      - name: Upload alien-deploy binary
        uses: actions/upload-artifact@v4
        with:
          name: alien-deploy-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/alien-deploy

      - name: Upload alien-agent binary
        uses: actions/upload-artifact@v4
        with:
          name: alien-agent-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/alien-agent

  upload-binaries:
    needs: [prepare, build-binaries-linux, build-binaries-macos]
    if: ${{ !inputs.dry_run }}
    runs-on: depot-ubuntu-24.04-arm
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::216938125589:role/alien-releases-upload
          aws-region: us-east-1

      - name: Upload to S3 (versioned + latest)
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"

          upload() {
            local binary=$1 target=$2 os=$3 arch=$4
            aws s3 cp "./artifacts/${binary}-${target}/${binary}" "s3://alien-releases-prod/${binary}/v${VERSION}/${os}-${arch}/${binary}"
            aws s3 cp "./artifacts/${binary}-${target}/${binary}" "s3://alien-releases-prod/${binary}/latest/${os}-${arch}/${binary}"
          }

          # Linux
          for binary in alien alien-deploy alien-agent; do
            upload "$binary" x86_64-unknown-linux-musl linux x86_64
            upload "$binary" aarch64-unknown-linux-musl linux aarch64
          done

          # macOS
          for binary in alien alien-deploy alien-agent; do
            upload "$binary" x86_64-apple-darwin darwin x86_64
            upload "$binary" aarch64-apple-darwin darwin aarch64
          done

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.RELEASES_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/alien/latest/*" "/alien-deploy/latest/*" "/alien-agent/latest/*"
