name: CI Fast

on:
  pull_request:
  merge_group:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  fast:
    runs-on: depot-ubuntu-24.04-arm-16
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            examples/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Setup Depot
        uses: depot/setup-action@v1
        with:
          project: ${{ vars.DEPOT_PROJECT_ID }}

      - name: Install sccache
        uses: taiki-e/install-action@sccache

      - name: Setup cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: depot cargo install cargo-zigbuild --locked

      - name: Add musl targets
        run: |
          rustup target add aarch64-unknown-linux-musl
          rustup target add x86_64-unknown-linux-musl

      - name: Configure git credentials for cargo
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com" > ~/.git-credentials
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm format-and-lint

      - name: TypeScript typecheck
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: pnpm test:ts

      - name: Rust fast tests (non-cloud)
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
          AXIOM_OTLP_ENDPOINT: ${{ secrets.AXIOM_OTLP_ENDPOINT }}
          AXIOM_TOKEN: ${{ secrets.AXIOM_TOKEN }}
          AXIOM_DATASET: ${{ secrets.AXIOM_DATASET }}
        run: |
          depot cargo nextest run --workspace \
            --exclude alien-aws-clients \
            --exclude alien-gcp-clients \
            --exclude alien-azure-clients \
            --exclude alien-k8s-clients \
            --exclude alien-bindings \
            --exclude byocdb \
            --exclude endpoint-agent \
            --exclude alien-test-server \
            --filter-expr 'not binary_id(alien-build::build_integration_tests) and not binary_id(alien-build::rust_integration_tests) and not binary_id(alien-build::typescript_integration_tests) and not binary_id(alien-runtime::lambda)'

      - name: Build alien CLI
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: depot cargo build -p alien-cli --bin alien

      - name: Build TypeScript packages
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: pnpm build

      - name: Run examples
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: pnpm test:examples

      - name: Run local e2e tests
        run: pnpm test:e2e:local
