name: CI Fast

on:
  pull_request:
  merge_group:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  # Fall back to local compilation when the shared sccache backend returns a
  # transient error (e.g. webdav 403) instead of failing the whole build.
  SCCACHE_IGNORE_SERVER_IO_ERROR: "1"

jobs:
  fast:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true
    runs-on: depot-ubuntu-24.04-arm-16
    timeout-minutes: 120
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      # Bound the build/test memory peak: this job's recurring failure mode
      # is the runner agent being starved for memory mid Rust-tests (GitHub
      # reports "runner lost communication" with no logs). Full-width
      # parallelism (16 rustc jobs, then 16 concurrent test binaries — many
      # of which spawn servers and embedded databases) is what spikes it.
      CARGO_BUILD_JOBS: "12"
      NEXTEST_TEST_THREADS: "10"

    steps:
      - name: Validate PR title
        if: github.event_name == 'pull_request'
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$TITLE" | grep -qE '^(feat|fix|refactor|chore|docs|test|ci|perf)(\(.+\))?!?: .+'; then
            echo "::error::PR title must follow Conventional Commits: <type>: <description>"
            echo "  Valid types: feat, fix, refactor, chore, docs, test, ci, perf"
            echo "  Example: feat: add Azure container deployment support"
            exit 1
          fi

      - uses: actions/checkout@v5

      - uses: dorny/paths-filter@v4
        id: changes
        continue-on-error: true
        with:
          filters: |
            examples:
              - 'examples/**'
              - 'packages/**'
              - 'crates/alien-cli/**'
              - 'crates/alien-deploy-cli/**'
              - 'crates/alien-operator/**'
              # The addon crates feed the dual-runtime import and
              # compile-embed checks — without them a PR touching only the
              # napi layer or the bindings core skips both.
              - 'crates/alien-bindings-node/**'
              - 'crates/alien-bindings/**'
              - 'crates/alien-build/**'

      - uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            examples/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - uses: depot/setup-action@v1

      - uses: mozilla-actions/sccache-action@v0.0.10
        continue-on-error: true
        with:
          version: v0.16.0

      - uses: taiki-e/install-action@nextest

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ github.token }}

      - name: Install CloudFormation linter
        run: pipx install cfn-lint

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.3
          terraform_wrapper: false

      - uses: azure/setup-helm@v5

      - name: Install kubeconform
        run: |
          case "$(uname -m)" in
            x86_64) KUBECONFORM_ARCH=amd64 ;;
            aarch64|arm64) KUBECONFORM_ARCH=arm64 ;;
            *) echo "Unsupported kubeconform architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          curl -L "https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-${KUBECONFORM_ARCH}.tar.gz" \
            | tar xz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Install zig (needed by cargo-zigbuild for example builds)
        run: pip3 install ziglang

      - name: Configure git credentials for cargo
        run: git config --global url."https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm format-and-lint

      - name: TypeScript typecheck
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: pnpm test:ts

      - name: Build bindings dev addon (used by package and compiled-binary tests)
        # alien-bindings-node is not a pnpm workspace member; resolve the napi
        # CLI from package-layout's devDependencies (root frozen-lockfile
        # install), matching the fixture's own CI recipe in run.ts. Debug
        # profile with capped jobs: a cold --release build at full parallelism
        # has been killing the runner mid-step (OOM); the tests only need the
        # .node file to exist, not to be fast.
        working-directory: crates/alien-bindings-node
        env:
          CARGO_BUILD_JOBS: "6"
        run: ../../packages/package-layout/node_modules/.bin/napi build --platform

      - name: Validate package layout
        run: pnpm validate:package-layout

      - name: TypeScript unit tests
        # The per-package vitest suites (commands receiver twins, bindings
        # loader/error mapping, core schemas, ai-gateway client/gateway) —
        # `test:ts` above is typecheck-only, so without this step they never
        # ran in CI. Must run after the dev-addon build: the bindings
        # kv/queue/storage/vault suites load the native addon. The ai-gateway
        # suites inject a mock addon, so they need no built .node here.
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: pnpm --filter @alienplatform/core --filter @alienplatform/bindings --filter @alienplatform/commands --filter @alienplatform/ai-gateway test

      - name: Rust fast tests (non-cloud)
        env:
          AXIOM_OTLP_ENDPOINT: https://api.axiom.co/v1/logs
          AXIOM_TOKEN: ${{ secrets.AXIOM_CI_API_KEY }}
          AXIOM_DATASET: dev
        run: |
          depot cargo nextest run --workspace \
            --exclude alien-aws-clients \
            --exclude alien-gcp-clients \
            --exclude alien-azure-clients \
            --exclude alien-k8s-clients \
            --exclude alien-bindings \
            --exclude byocdb \
            --exclude endpoint-agent \
            --exclude alien-test-server \
            --filter-expr 'not binary_id(alien-build::build_integration_tests) and not binary_id(alien-build::image_shape_tests) and not binary_id(alien-build::rust_integration_tests) and not binary_id(alien-build::typescript_integration_tests) and not binary_id(alien-worker-runtime::lambda) and not binary_id(alien-test::distribution) and not binary_id(alien-test::pull) and not binary_id(alien-test::push) and not binary_id(alien-manager::registry_proxy_cloud_test) and not binary_id(alien-ai-gateway::live_bedrock) and not binary_id(alien-ai-gateway::live_foundry_claude) and not binary_id(alien-ai-gateway::live_vertex_claude)'

      - name: Build all CLIs
        if: steps.changes.outcome != 'success' || steps.changes.outputs.examples == 'true' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        run: depot cargo build -p alien-cli -p alien-deploy-cli -p alien-operator

      - name: Build TypeScript packages
        if: steps.changes.outcome != 'success' || steps.changes.outputs.examples == 'true' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: pnpm build && pnpm -C packages/package-layout check

      - name: Command twins real-wire integration
        if: steps.changes.outcome != 'success' || steps.changes.outputs.examples == 'true' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        # Drives the TS command sender/receiver against the real Rust command
        # server (test-command-server bin, test-utils feature). Cargo is already
        # set up and warm from the Rust fast-tests step above; the suite fails
        # loudly if the server can't build/start (no silent skip).
        run: pnpm -C packages/commands test:integration

      - name: Run examples
        if: steps.changes.outcome != 'success' || steps.changes.outputs.examples == 'true' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        env:
          # The preceding package build already produced the local artifacts
          # consumed by the examples; rebuilding the generated SDK can exceed
          # the Node heap on CI runners.
          ALIEN_EXAMPLES_REUSE_BUILT_PACKAGES: "true"
          NODE_OPTIONS: "--max-old-space-size=4096"
          RUST_LOG: info
          VERBOSE: "true"
        run: pnpm test:examples
