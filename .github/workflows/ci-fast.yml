name: CI Fast

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  fast:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm format-and-lint

      - name: TypeScript typecheck
        run: pnpm test:ts

      - name: Rust fast tests (non-cloud)
        run: |
          cargo nextest run --workspace \
            --exclude alien-aws-clients \
            --exclude alien-gcp-clients \
            --exclude alien-azure-clients \
            --exclude alien-bindings \
            --exclude alien-build \
            --exclude alien-runtime \
            --exclude dockdash \
            --exclude byocdb \
            --exclude endpoint-agent \
            --exclude alien-test-server
