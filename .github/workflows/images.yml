name: Images Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: depot-ubuntu-24.04-arm-16
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Setup Depot
        uses: depot/setup-action@v1
        with:
          project: ${{ vars.DEPOT_PROJECT_ID }}

      - name: Install sccache
        uses: taiki-e/install-action@sccache

      - name: Configure git credentials for cargo
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com" > ~/.git-credentials

      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: depot cargo install cargo-zigbuild --locked

      - name: Add musl targets
        run: |
          rustup target add aarch64-unknown-linux-musl
          rustup target add x86_64-unknown-linux-musl

      - name: Build alien-runtime (x86_64)
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          depot cargo zigbuild -p alien-runtime --bin alien-runtime \
            --target x86_64-unknown-linux-musl \
            --release

      - name: Build alien-runtime (aarch64)
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          depot cargo zigbuild -p alien-runtime --bin alien-runtime \
            --target aarch64-unknown-linux-musl \
            --release

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata (alien-base)
        id: meta_base
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/alienplatform/alien-base
          tags: |
            type=raw,value=latest
            type=ref,event=tag

      - name: Publish alien-base
        uses: depot/build-push-action@v1
        with:
          project: ${{ vars.DEPOT_PROJECT_ID }}
          context: .
          file: docker/Dockerfile.alien-base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_base.outputs.tags }}
          labels: ${{ steps.meta_base.outputs.labels }}
          provenance: true
          sbom: true

      - name: Metadata (alien-builder)
        id: meta_builder
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/alienplatform/alien-builder
          tags: |
            type=raw,value=latest
            type=ref,event=tag

      - name: Publish alien-builder
        uses: depot/build-push-action@v1
        with:
          project: ${{ vars.DEPOT_PROJECT_ID }}
          context: .
          file: docker/Dockerfile.alien-builder
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_builder.outputs.tags }}
          labels: ${{ steps.meta_builder.outputs.labels }}
          provenance: true
          sbom: true
