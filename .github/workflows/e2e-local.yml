name: E2E Local

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e-local:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build alien CLI
        run: cargo build -p alien-cli --bin alien

      - name: Run local e2e tests
        run: pnpm test:e2e:local
