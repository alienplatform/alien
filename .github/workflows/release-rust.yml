name: Release Rust

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    runs-on: depot-ubuntu-22.04-4
    env:
      DEPOT_TOKEN: ${{ secrets.DEPOT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - name: Setup Depot
        uses: depot/setup-action@v1
        with:
          project: ${{ vars.DEPOT_PROJECT_ID }}
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - name: Configure git credentials for cargo
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com" > ~/.git-credentials
      - name: Create/Update Rust release PR
        uses: release-plz/action@v0.5
        with:
          command: release-pr
          config: .release-plz.toml
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"

  release:
    needs: release-pr
    runs-on: depot-ubuntu-22.04-4
    if: github.ref == 'refs/heads/main'
    env:
      DEPOT_TOKEN: ${{ secrets.DEPOT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - name: Setup Depot
        uses: depot/setup-action@v1
        with:
          project: ${{ vars.DEPOT_PROJECT_ID }}
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - name: Configure git credentials for cargo
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com" > ~/.git-credentials
      - name: Publish Rust crates and create GitHub releases
        uses: release-plz/action@v0.5
        with:
          command: release
          config: .release-plz.toml
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
