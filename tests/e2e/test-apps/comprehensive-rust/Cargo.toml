[package]
name = "alien-test-server"
version = "0.1.0"
edition = "2021"

[lib]
name = "alien_test_server"
path = "src/lib.rs"

[[bin]]
name = "alien-test-server"
path = "src/bin/main.rs"

[dependencies]
alien-sdk = { workspace = true, features = ["grpc", "openapi", "local", "gcp", "aws", "azure"] }
alien-core = { workspace = true, features = ["openapi"] }
alien-error = { workspace = true, features = ["axum", "openapi"] }
anyhow = { workspace = true }
axum = { workspace = true, features = ["macros", "tokio", "http1", "http2"] }
bytes = { workspace = true }
chrono = { workspace = true }
dockdash = { workspace = true }
futures-util = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tokio-stream = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true } 
object_store = { workspace = true }
clap = { workspace = true, features = ["derive", "env"] }
utoipa = { workspace = true, features = ["axum_extras"] }
uuid = { workspace = true, features = ["v4", "serde"] }
sha2 = "0.10"
