[package]
name = "runtime-less-rust-daemon"
version = "0.1.0"
edition = "2021"
publish = false

[[bin]]
name = "runtime-less-rust-daemon"
path = "src/main.rs"

[dependencies]
alien-bindings = { workspace = true, features = ["kubernetes", "local"] }
alien-commands = { workspace = true, default-features = false, features = ["receiver"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
