[package]
name = "tcp-transaction-server"
version = "0.1.0"
edition = "2021"
publish = false

[[bin]]
name = "tcp-transaction-server"
path = "src/main.rs"

[dependencies]
tokio = { workspace = true, features = ["io-util", "macros", "net", "rt-multi-thread"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
