[package]
name = "endpoint-agent"
version = "0.1.0"
edition = "2021"

[dependencies]
# Alien bindings
alien-sdk = { workspace = true, features = ["grpc"] }

# Error handling
thiserror = { workspace = true }
alien-error = { workspace = true }

# Async runtime
tokio = { workspace = true, features = ["full"] }

# Serialization
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter", "json"] }

# Encrypted database
turso = { workspace = true }
aegis = { version = "0.9", features = ["pure-rust"] }

# Utilities
chrono = { workspace = true, features = ["serde"] }
rand = "0.8.5"

# File monitoring
notify = "7.0.0"

# Hash computation
blake3 = "1.5.5"

# Regex for PII detection
regex = "1.11.1"

[dev-dependencies]
