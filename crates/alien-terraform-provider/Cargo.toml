[package]
name = "alien-terraform-provider"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Terraform provider shim for Alien deployment registration"
license-file.workspace = true

[lib]
name = "alien_terraform_provider"
path = "src/lib.rs"

[[bin]]
name = "terraform-provider-alien"
path = "src/main.rs"

[dependencies]
alien-core = { workspace = true }
alien-error = { workspace = true }
alien-manager-api = { workspace = true }
async-trait = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
reqwest = { workspace = true, features = ["json"] }
clap = { workspace = true, features = ["derive", "env"] }
url = { workspace = true }
thiserror = { workspace = true }
tf-provider = { git = "https://github.com/aneoconsulting/tf-provider", version = "0.2.2" }
anyhow.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
