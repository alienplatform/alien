[package]
name = "alien-sdk"
version.workspace = true
edition = "2021"
description = "Alien SDK for Rust — cloud-agnostic bindings for storage, KV, queues, vault, and more"
license-file.workspace = true

[features]
default = ["grpc", "all-platforms"]
all-platforms = ["alien-bindings/all-platforms"]
aws = ["alien-bindings/aws"]
gcp = ["alien-bindings/gcp"]
azure = ["alien-bindings/azure"]
kubernetes = ["alien-bindings/kubernetes"]
local = ["alien-bindings/local"]
test = ["alien-bindings/test"]
# The worker app protocol (Control + WaitUntil gRPC) lives in
# alien-worker-protocol; `grpc` pulls the app-side clients used by AlienContext /
# WaitUntilContext plus the tonic runtime they need.
grpc = ["dep:alien-worker-protocol", "dep:tonic", "dep:prost-types", "dep:tokio-stream"]
openapi = ["alien-bindings/openapi", "dep:utoipa"]
platform-sdk = ["alien-bindings/platform-sdk"]

[dependencies]
alien-bindings = { workspace = true }
alien-core = { workspace = true }
alien-error = { workspace = true }
async-trait = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
futures = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["sync", "macros", "rt", "time"] }
tracing = { workspace = true }
uuid = { workspace = true, features = ["v4", "serde"] }

# gRPC (app-side worker-protocol clients only; server + protocol live in alien-worker-protocol)
alien-worker-protocol = { workspace = true, optional = true }
tonic = { workspace = true, optional = true }
prost-types = { workspace = true, optional = true }
tokio-stream = { workspace = true, optional = true }

# OpenAPI schema derives on the wait_until types
utoipa = { workspace = true, optional = true }
