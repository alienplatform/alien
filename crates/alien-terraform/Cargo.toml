[package]
name = "alien-terraform"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Terraform module generation for Alien stacks"
license-file.workspace = true

[features]
default = []
# Pull in the alien-core jsonschema feature so generated modules stay aligned with the
# typed ImportData JsonSchema snapshots.
jsonschema = ["alien-core/jsonschema"]
test-utils = []

[dependencies]
alien-core = { workspace = true }
alien-error = { workspace = true }
alien-permissions = { workspace = true }
hcl-rs = { workspace = true }
indexmap = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tempfile = { workspace = true }

[dev-dependencies]
indexmap = { workspace = true }
insta = { workspace = true, features = ["json"] }
