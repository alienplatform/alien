[package]
name = "alien-worker-protocol"
version.workspace = true
edition = "2021"
description = "gRPC worker app protocol (task delivery, lifecycle, waitUntil) between the Alien runtime and the application it manages"
license-file.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]
alien-error = { workspace = true }
async-stream = { workspace = true }
async-trait = { workspace = true }
prost = { workspace = true }
prost-types = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["sync", "macros", "rt", "time"] }
tokio-stream = { workspace = true }
tonic = { workspace = true }
tonic-reflection = { workspace = true }
tracing = { workspace = true }

[build-dependencies]
tonic-build = { workspace = true }
