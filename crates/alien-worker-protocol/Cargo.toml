[package]
name = "alien-worker-protocol"
version.workspace = true
edition = "2021"
description = "gRPC Worker app protocol for task delivery, lifecycle, and waitUntil"
license-file.workspace = true

[lib]
crate-type = ["rlib"]

[features]
default = []
server = [
    "dep:alien-error",
    "dep:async-stream",
    "dep:async-trait",
    "dep:serde",
    "dep:serde_json",
    "dep:tokio",
    "dep:tokio-stream",
    "dep:tonic-reflection",
    "dep:tracing",
]

[dependencies]
alien-error = { workspace = true, optional = true }
async-stream = { workspace = true, optional = true }
async-trait = { workspace = true, optional = true }
prost = { workspace = true }
prost-types = { workspace = true }
serde = { workspace = true, features = ["derive"], optional = true }
serde_json = { workspace = true, optional = true }
tokio = { workspace = true, features = ["sync", "macros", "rt", "time", "net"], optional = true }
tokio-stream = { workspace = true, optional = true }
tonic = { workspace = true }
tonic-reflection = { workspace = true, optional = true }
tracing = { workspace = true, optional = true }

[build-dependencies]
tonic-build = { workspace = true }
